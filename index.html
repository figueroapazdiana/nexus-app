<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#04040a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NEXUS" />
  <link rel="manifest" href="manifest.json" />
  <title>NEXUS</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body { background: #04040a; font-family: 'Outfit', sans-serif; color: #f1f5f9; }
    #root { height: 100%; }
    input, textarea, select, button { font-family: 'Outfit', sans-serif; outline: none; border: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e1b4b; border-radius: 4px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes ripple { 0% { transform: scale(0.8); opacity: 0.6; } 100% { transform: scale(2.4); opacity: 0; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    /* ═══════════════════ CONSTANTS ═══════════════════ */
    const C = {
      bg: "#04040a", card: "#09090f", card2: "#0d0d15", border: "#141420",
      teal: "#a78bfa", pink: "#f472b6", yellow: "#fb923c", purple: "#8b5cf6",
      red: "#f43f5e", green: "#34d399", orange: "#f97316", blue: "#818cf8",
      text: "#f1f5f9", muted: "#64748b", mutedDark: "#334155",
      grad: "linear-gradient(135deg, #7c3aed, #ea580c)",
    };

    const MODES = {
      ejecutivo: { name: "Ejecutivo", emoji: "🎯", color: "#a78bfa",
        prompt: "Eres un COO de élite. Directo, eficiente, sin rodeos. Cada respuesta es concisa y accionable. Máxima eficiencia, cero relleno." },
      coach: { name: "Coach", emoji: "💪", color: "#f472b6",
        prompt: "Coach brutalmente honesto. Sin excusas. Si hay tareas vencidas, confrontas directamente. Regañas cuando es necesario. CAPS para énfasis." },
      fun: { name: "Fun", emoji: "😂", color: "#fb923c",
        prompt: "Divertido e irreverente. Humor inteligente sobre productividad. Bromas sobre procrastinación pero siempre llevando a la acción." },
      hype: { name: "Hype", emoji: "🔥", color: "#f97316",
        prompt: "El hype man definitivo. Cada logro es ÉPICO. Energía pura contagiosa. Celebras hasta los avances pequeños. CAPS frecuentes." },
      zen: { name: "Zen", emoji: "🧘", color: "#818cf8",
        prompt: "Calmo, sabio, estratégico. Perspectiva elevada. Ayudas a ver el panorama completo sin estrés. Claridad sobre caos." },
      savage: { name: "Savage", emoji: "😤", color: "#f43f5e",
        prompt: "Sin filtros absolutos. No toleras excusas bajo ningún concepto. Lenguaje directo al punto de ser incómodo. Cada tarea vencida es inaceptable. Obligas a actuar AHORA." },
    };

    const EVENT_TYPES = {
      meeting:  { label: "Reunión",   emoji: "🤝", color: C.teal },
      call:     { label: "Llamada",   emoji: "📞", color: C.green },
      task:     { label: "Pendiente", emoji: "✅", color: C.yellow },
      personal: { label: "Personal",  emoji: "🌟", color: C.purple },
      payment:  { label: "Pago",      emoji: "💰", color: C.orange },
    };

    const REMINDER_OPTIONS = [
      { value: 0, label: "A la hora exacta" },
      { value: 5, label: "5 min antes" },
      { value: 15, label: "15 min antes" },
      { value: 30, label: "30 min antes" },
      { value: 60, label: "1 hora antes" },
      { value: 120, label: "2 horas antes" },
      { value: 1440, label: "1 día antes" },
    ];

    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    const todayStr = () => { const d = new Date(); return d.toISOString().slice(0, 10); };
    const fmtDate = (d) => { if (!d) return ""; const p = d.split("-"); return `${p[2]}/${p[1]}`; };
    const dayName = (d) => new Date(d + "T12:00:00").toLocaleDateString("es-MX", { weekday: "short" }).toUpperCase();
    const daysDiff = (a, b) => Math.round((new Date(a) - new Date(b)) / 86400000);

    /* ═══════════════════ FIREBASE INIT ═══════════════════ */
    let db = null;
    try {
      const firebaseConfig = {
        apiKey: "AIzaSyB9gOn6-iLDjIH4jjFIJ8Z9IGvYLphsEy0",
        authDomain: "nexus-bf893.firebaseapp.com",
        projectId: "nexus-bf893",
        storageBucket: "nexus-bf893.firebasestorage.app",
        messagingSenderId: "543867357397",
        appId: "1:543867357397:web:cf694d8ec6af33c840fa5c"
      };
      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
    } catch (e) { console.warn("Firebase init failed:", e); }
    const USER_DOC = "diana";

    /* ═══════════════════ MAIN APP ═══════════════════ */
    function NEXUS() {
      /* ─── State ─── */
      const [tab, setTab] = useState("dashboard");
      const [mode, setMode] = useState("ejecutivo");
      const [showModeSelect, setShowModeSelect] = useState(false);
      const [tasks, setTasks] = useState([]);
      const [events, setEvents] = useState([]);
      const [payments, setPayments] = useState([]);
      const [projects, setProjects] = useState([]);
      const [contacts, setContacts] = useState([]);
      const [finance, setFinance] = useState([]);
      const [routine, setRoutine] = useState([]);
      const [routineLog, setRoutineLog] = useState({});
      const [messages, setMessages] = useState([]);
      const [ttsOn, setTtsOn] = useState(false);
      const [unifiedFilter, setUnifiedFilter] = useState("all");
      const [moreTab, setMoreTab] = useState("projects");
      const [showMore, setShowMore] = useState(false);

      // Modals
      const [modal, setModal] = useState(null); // "task"|"event"|"payment"|"project"|"contact"|"finance"|"habit"
      const [editItem, setEditItem] = useState(null);
      const [reminder, setReminder] = useState(null);
      const [snoozed, setSnoozed] = useState({});

      /* ─── Persist helper ─── */
      const persist = useCallback((key, val) => {
        try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
      }, []);

      const fireSync = useCallback((key, val) => {
        if (!db) return;
        try { db.collection("users").doc(USER_DOC).set({ [key]: JSON.stringify(val), [`${key}_ts`]: Date.now() }, { merge: true }); }
        catch (e) { console.warn("Firestore write fail:", e); }
      }, []);

      const save = useCallback((localKey, setter, val) => {
        setter(val);
        persist(localKey, val);
        fireSync(localKey, val);
      }, [persist, fireSync]);

      /* ─── Load data ─── */
      useEffect(() => {
        const KEYS = [
          ["nx3_tasks", setTasks], ["nx3_events", setEvents], ["nx3_payments", setPayments],
          ["nx3_projects", setProjects], ["nx3_contacts", setContacts], ["nx3_finance", setFinance],
          ["nx3_routine", setRoutine], ["nx3_routinelog", setRoutineLog],
          ["nx3_messages", setMessages], ["nx3_tts", setTtsOn],
        ];
        KEYS.forEach(([key, setter]) => {
          try { const v = localStorage.getItem(key); if (v) setter(JSON.parse(v)); } catch {}
        });
        try {
          const m = localStorage.getItem("nx3_mode");
          if (m) setMode(JSON.parse(m));
        } catch {}
        try {
          const md = localStorage.getItem("nx3_modeday");
          if (!md || JSON.parse(md) !== todayStr()) setShowModeSelect(true);
        } catch { setShowModeSelect(true); }

        // Firebase load
        if (db) {
          try {
            db.collection("users").doc(USER_DOC).get().then(doc => {
              if (!doc.exists) return;
              const d = doc.data();
              KEYS.forEach(([key, setter]) => {
                try {
                  const localTs = parseInt(localStorage.getItem(key + "_ts") || "0");
                  const remoteTs = d[key + "_ts"] || 0;
                  if (remoteTs > localTs && d[key]) {
                    const parsed = JSON.parse(d[key]);
                    setter(parsed);
                    localStorage.setItem(key, d[key]);
                    localStorage.setItem(key + "_ts", String(remoteTs));
                  }
                } catch {}
              });
            }).catch(() => {});
          } catch {}
        }

        // Request notification permission
        try { if ("Notification" in window && Notification.permission === "default") Notification.requestPermission(); } catch {}
      }, []);

      /* ─── Derived data ─── */
      const today = todayStr();
      const overdueTasks = useMemo(() => tasks.filter(t => t.status !== "done" && t.dueDate && t.dueDate < today), [tasks, today]);
      const pendingTasks = useMemo(() => tasks.filter(t => t.status !== "done"), [tasks]);
      const doneTasks = useMemo(() => tasks.filter(t => t.status === "done"), [tasks]);
      const todayEvents = useMemo(() => events.filter(e => e.date === today).sort((a, b) => (a.time || "").localeCompare(b.time || "")), [events, today]);
      const pendingTodayEvents = useMemo(() => todayEvents.filter(e => e.status !== "done"), [todayEvents]);
      const todayRoutineDone = useMemo(() => {
        const log = routineLog[today] || {};
        return routine.filter(h => log[h.id]).length;
      }, [routine, routineLog, today]);

      const companies = useMemo(() => {
        const s = new Set();
        tasks.forEach(t => t.company && s.add(t.company));
        events.forEach(e => e.company && s.add(e.company));
        payments.forEach(p => p.company && s.add(p.company));
        projects.forEach(p => p.company && s.add(p.company));
        contacts.forEach(c => c.company && s.add(c.company));
        finance.forEach(f => f.company && s.add(f.company));
        return [...s].sort();
      }, [tasks, events, payments, projects, contacts, finance]);

      const upcomingPayments = useMemo(() => {
        const in7 = new Date(); in7.setDate(in7.getDate() + 7);
        const in7s = in7.toISOString().slice(0, 10);
        return payments.filter(p => p.nextDue && p.nextDue <= in7s && p.nextDue >= today).sort((a, b) => a.nextDue.localeCompare(b.nextDue));
      }, [payments, today]);

      const monthFinance = useMemo(() => {
        const ym = today.slice(0, 7);
        const items = finance.filter(f => f.date && f.date.startsWith(ym));
        const income = items.filter(f => f.ftype === "income").reduce((s, f) => s + (f.amount || 0), 0);
        const expense = items.filter(f => f.ftype === "expense").reduce((s, f) => s + (f.amount || 0), 0);
        return { income, expense, net: income - expense, items };
      }, [finance, today]);

      /* ─── Unified items for dashboard ─── */
      const unifiedItems = useMemo(() => {
        if (unifiedFilter === "projects") return [];
        const items = [];
        if (unifiedFilter === "all" || unifiedFilter === "task") {
          pendingTasks.forEach(t => items.push({ ...t, _kind: "task" }));
        }
        if (unifiedFilter !== "task") {
          events.filter(e => e.status !== "done" && (unifiedFilter === "all" || e.type === unifiedFilter))
            .forEach(e => items.push({ ...e, _kind: "event" }));
        }
        return items.sort((a, b) => {
          const aD = a.dueDate || a.date || "9999";
          const bD = b.dueDate || b.date || "9999";
          if (aD < today && bD >= today) return -1;
          if (bD < today && aD >= today) return 1;
          return aD.localeCompare(bD);
        });
      }, [unifiedFilter, pendingTasks, events, today]);

      /* ─── Save helpers ─── */
      const saveTasks = (v) => save("nx3_tasks", setTasks, v);
      const saveEvents = (v) => save("nx3_events", setEvents, v);
      const savePayments = (v) => save("nx3_payments", setPayments, v);
      const saveProjects = (v) => save("nx3_projects", setProjects, v);
      const saveContacts = (v) => save("nx3_contacts", setContacts, v);
      const saveFinance = (v) => save("nx3_finance", setFinance, v);
      const saveRoutine = (v) => save("nx3_routine", setRoutine, v);
      const saveRoutineLog = (v) => save("nx3_routinelog", setRoutineLog, v);
      const saveMessages = (v) => save("nx3_messages", setMessages, v);

      const selectMode = (m) => {
        setMode(m);
        persist("nx3_mode", m);
        persist("nx3_modeday", todayStr());
        fireSync("nx3_mode", m);
        setShowModeSelect(false);
      };

      const toggleTask = (id) => {
        const updated = tasks.map(t => t.id === id ? { ...t, status: t.status === "done" ? "pending" : "done" } : t);
        saveTasks(updated);
      };

      const toggleEvent = (id) => {
        const updated = events.map(e => e.id === id ? { ...e, status: e.status === "done" ? "pending" : "done" } : e);
        saveEvents(updated);
      };

      const toggleRoutineItem = (hid) => {
        const log = { ...routineLog };
        if (!log[today]) log[today] = {};
        log[today][hid] = !log[today][hid];
        saveRoutineLog(log);
      };

      const deleteTask = (id) => saveTasks(tasks.filter(t => t.id !== id));
      const deleteEvent = (id) => saveEvents(events.filter(e => e.id !== id));

      /* ─── Process AI actions ─── */
      const processActions = useCallback((text) => {
        const m = text.match(/---ACTIONS---([\s\S]*?)---END---/);
        if (!m) return text.replace(/---ACTIONS---[\s\S]*?---END---/g, "").trim();
        try {
          const { actions } = JSON.parse(m[1]);
          actions.forEach(a => {
            switch (a.type) {
              case "addTask": saveTasks([...tasks, { id: uid(), title: a.title, dueDate: a.dueDate, project: a.project || "", company: a.company || "", priority: a.priority || "medium", notes: a.notes || "", status: "pending" }]); break;
              case "addEvent": saveEvents([...events, { id: uid(), title: a.title, date: a.date, time: a.time || "", type: a.evtype || "task", company: a.company || "", contact: a.contact || "", notes: a.notes || "", status: "pending", reminders: [15] }]); break;
              case "addPayment": savePayments([...payments, { id: uid(), name: a.name, amount: a.amount, nextDue: a.nextDue, company: a.company || "" }]); break;
              case "addProject": saveProjects([...projects, { id: uid(), name: a.name, company: a.company || "" }]); break;
              case "addContact": saveContacts([...contacts, { id: uid(), name: a.name, phone: a.phone || "", company: a.company || "", notes: a.notes || "" }]); break;
              case "addFinance": saveFinance([...finance, { id: uid(), ftype: a.ftype, amount: a.amount, description: a.description || "", company: a.company || "", date: a.date || todayStr() }]); break;
              case "completeTask": saveTasks(tasks.map(t => t.id === a.id ? { ...t, status: "done" } : t)); break;
              case "completeEvent": saveEvents(events.map(e => e.id === a.id ? { ...e, status: "done" } : e)); break;
              case "addHabit": saveRoutine([...routine, { id: uid(), title: a.title, icon: a.icon || "⭐" }]); break;
            }
          });
        } catch (e) { console.warn("Action parse error:", e); }
        return text.replace(/---ACTIONS---[\s\S]*?---END---/g, "").trim();
      }, [tasks, events, payments, projects, contacts, finance, routine]);

      /* ─── Reminder system ─── */
      useEffect(() => {
        const check = () => {
          const now = new Date();
          const nowMin = now.getHours() * 60 + now.getMinutes();
          const todayS = todayStr();

          // Check event reminders
          events.forEach(ev => {
            if (ev.status === "done" || ev.date !== todayS || !ev.time || !ev.reminders) return;
            const [h, m] = ev.time.split(":").map(Number);
            const evMin = h * 60 + m;
            ev.reminders.forEach(r => {
              const triggerMin = evMin - r;
              if (nowMin === triggerMin && !snoozed[ev.id + "_" + r]) {
                setReminder({ ...ev, reminderType: r === 0 ? "exact" : "advance", minBefore: r });
                try { if ("Notification" in window && Notification.permission === "granted") new Notification("NEXUS", { body: `${r > 0 ? r + " min para: " : ""}${ev.title}`, icon: "📅" }); } catch {}
              }
            });
          });

          // Check overdue tasks
          if (nowMin % 10 === 0) {
            const od = tasks.filter(t => t.status !== "done" && t.dueDate && t.dueDate < todayS && !snoozed["task_" + t.id]);
            if (od.length > 0 && !reminder) {
              setReminder({ title: `${od.length} tarea${od.length > 1 ? "s" : ""} vencida${od.length > 1 ? "s" : ""}`, reminderType: "overdue", tasks: od });
              try { if ("Notification" in window && Notification.permission === "granted") new Notification("NEXUS", { body: `Tienes ${od.length} tareas vencidas` }); } catch {}
            }
          }
        };
        const iv = setInterval(check, 60000);
        check();
        return () => clearInterval(iv);
      }, [events, tasks, snoozed, reminder]);

      const snoozeReminder = (id, minutes) => {
        setSnoozed(prev => ({ ...prev, [id]: Date.now() + minutes * 60000 }));
        setReminder(null);
      };

      /* ─── Styles ─── */
      const s = {
        root: { height: "100vh", display: "flex", flexDirection: "column", maxWidth: 520, margin: "0 auto", position: "relative", backgroundImage: "radial-gradient(circle, #1e1b4b33 1px, transparent 1px)", backgroundSize: "24px 24px", fontFamily: "'Outfit', sans-serif" },
        header: { padding: "12px 16px 8px", display: "flex", alignItems: "center", justifyContent: "space-between" },
        logo: { fontFamily: "'Bebas Neue', cursive", fontSize: 28, letterSpacing: 6, background: C.grad, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" },
        main: { flex: 1, overflowY: "auto", overflowX: "hidden", padding: "0 16px 16px", WebkitOverflowScrolling: "touch" },
        nav: { display: "flex", borderTop: `1px solid ${C.border}`, background: C.bg, paddingBottom: "env(safe-area-inset-bottom)" },
        navBtn: (active) => ({ flex: 1, padding: "10px 4px 8px", background: "none", color: active ? C.teal : C.muted, display: "flex", flexDirection: "column", alignItems: "center", gap: 2, fontSize: 10, fontWeight: 600, letterSpacing: 1, cursor: "pointer", position: "relative", transition: "color 0.2s" }),
        card: { background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 14, marginBottom: 10, animation: "fadeIn 0.3s ease" },
        btn: (bg) => ({ background: bg || C.grad, color: "#fff", border: "none", borderRadius: 8, padding: "10px 18px", fontSize: 13, fontWeight: 600, cursor: "pointer", letterSpacing: 0.5 }),
        input: { width: "100%", background: C.card2, border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 12px", color: C.text, fontSize: 14 },
        badge: (bg) => ({ background: bg || C.red, color: "#fff", borderRadius: 10, padding: "1px 6px", fontSize: 10, fontWeight: 700, position: "absolute", top: 4, right: "calc(50% - 16px)" }),
        tag: (color) => ({ display: "inline-block", background: color + "22", color: color, borderRadius: 6, padding: "2px 8px", fontSize: 11, fontWeight: 600 }),
        modal: { position: "fixed", inset: 0, zIndex: 100, display: "flex", flexDirection: "column", justifyContent: "flex-end" },
        overlay: { position: "absolute", inset: 0, background: "rgba(0,0,0,0.7)", backdropFilter: "blur(4px)" },
        sheet: { position: "relative", background: C.bg, borderTop: `1px solid ${C.border}`, borderRadius: "16px 16px 0 0", padding: "20px 16px", maxHeight: "85vh", overflowY: "auto", animation: "slideUp 0.3s ease", paddingBottom: "calc(20px + env(safe-area-inset-bottom))" },
      };

      /* ═══════════════════ MODE SELECT SCREEN ═══════════════════ */
      function ModeSelect() {
        return (
          <div style={{ position: "fixed", inset: 0, zIndex: 200, background: C.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, backgroundImage: "radial-gradient(circle, #1e1b4b33 1px, transparent 1px)", backgroundSize: "24px 24px" }}>
            <div style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 20, letterSpacing: 4, color: C.muted, marginBottom: 8 }}>NEXUS</div>
            <h1 style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 36, letterSpacing: 4, background: "linear-gradient(135deg, #a78bfa, #f97316)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", marginBottom: 32, textAlign: "center" }}>¿CÓMO OPERAS HOY?</h1>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, width: "100%", maxWidth: 400 }}>
              {Object.entries(MODES).map(([key, m]) => (
                <button key={key} onClick={() => selectMode(key)} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: "20px 12px", cursor: "pointer", transition: "all 0.2s", display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }} onMouseOver={e => { e.currentTarget.style.borderColor = m.color; e.currentTarget.style.transform = "scale(1.03)"; }} onMouseOut={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.transform = "scale(1)"; }}>
                  <span style={{ fontSize: 32 }}>{m.emoji}</span>
                  <span style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 18, letterSpacing: 3, color: m.color }}>{m.name.toUpperCase()}</span>
                  <span style={{ fontSize: 11, color: C.muted, lineHeight: 1.3, textAlign: "center" }}>{m.prompt.slice(0, 50)}…</span>
                </button>
              ))}
            </div>
          </div>
        );
      }

      /* ═══════════════════ DASHBOARD ═══════════════════ */
      function Dashboard() {
        const [showFinance, setShowFinance] = useState(false);
        const FILTERS = [
          { key: "all", label: "📋 Todo" }, { key: "meeting", label: "🤝 Reuniones" },
          { key: "call", label: "📞 Llamadas" }, { key: "task", label: "✅ Pendientes" },
          { key: "personal", label: "🌟 Personal" }, { key: "projects", label: "🗂 Proyectos" },
        ];
        return (
          <div>
            {/* Stats */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginBottom: 12 }}>
              {[

      function Chat() {
        const [input, setInput] = useState("");
        const [loading, setLoading] = useState(false);
        const [listening, setListening] = useState(false);
        const chatEnd = useRef(null);
        const recognitionRef = useRef(null);

        useEffect(() => { chatEnd.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, loading]);

        const buildSystem = () => {
          const modeData = MODES[mode];
          const ctx = {
            tareas_vencidas: overdueTasks.map(t => `"${t.title}" (${daysDiff(today, t.dueDate)}d atrás, ${t.company || "sin empresa"})`).join(", ") || "ninguna",
            tareas_pendientes: pendingTasks.length,
            eventos_hoy: todayEvents.map(e => `${e.time || "?"} ${e.title}`).join(", ") || "ninguno",
            pagos_proximos: upcomingPayments.map(p => `${p.name} $${p.amount} (${fmtDate(p.nextDue)})`).join(", ") || "ninguno",
            proyectos: projects.map(p => p.name).join(", ") || "ninguno",
            rutina_hoy: `${todayRoutineDone}/${routine.length}`,
            finanzas_mes: `Ingresos: $${monthFinance.income.toLocaleString()}, Gastos: $${monthFinance.expense.toLocaleString()}, Neto: $${monthFinance.net.toLocaleString()}`,
          };
          return `Tu nombre es NEXUS. Asistente ejecutivo personal de ultra-performance para Diana Figueroa Paz, quien maneja 6+ empresas simultáneamente.

PERSONALIDAD ACTIVA: ${modeData.name} — ${modeData.prompt}

CONTEXTO ACTUAL (${today}):
- Tareas vencidas: ${ctx.tareas_vencidas}
- Tareas pendientes: ${ctx.tareas_pendientes}
- Eventos hoy: ${ctx.eventos_hoy}
- Pagos próximos: ${ctx.pagos_proximos}
- Proyectos: ${ctx.proyectos}
- Rutina hoy: ${ctx.rutina_hoy}
- Finanzas mes: ${ctx.finanzas_mes}

REGLAS:
1. SIEMPRE en español. Máximo 3-4 oraciones normalmente.
2. Tienes capacidad de búsqueda web. Úsala para noticias, precios, investigación o cualquier info externa.
3. Si hay tareas vencidas, mencionarlas según tu personalidad activa.
4. Para agregar items al sistema, incluye al FINAL de tu respuesta (después del texto) el bloque exacto:
---ACTIONS---
{"actions":[{"type":"addTask","title":"...","dueDate":"YYYY-MM-DD","project":"","company":"","priority":"high|medium|low","notes":""},{"type":"addEvent","title":"...","date":"YYYY-MM-DD","time":"HH:MM","evtype":"meeting|call|task|personal|payment","company":"","contact":"","notes":""},{"type":"addPayment","name":"...","amount":0,"nextDue":"YYYY-MM-DD","company":""},{"type":"addProject","name":"...","company":""},{"type":"addContact","name":"...","phone":"","company":"","notes":""},{"type":"addFinance","ftype":"income|expense","amount":0,"description":"","company":"","date":"YYYY-MM-DD"},{"type":"completeTask","id":"ID_EXACTO"},{"type":"completeEvent","id":"ID_EXACTO"},{"type":"addHabit","title":"...","icon":"⭐"}]}
---END---
5. Detectar la empresa del contexto cuando agregues items.
6. Solo usa las acciones que necesites, no incluyas las que no aplican.

IDs de tareas actuales: ${pendingTasks.map(t => `${t.id}:"${t.title}"`).join(", ")}
IDs de eventos pendientes hoy: ${pendingTodayEvents.map(e => `${e.id}:"${e.title}"`).join(", ")}`;
        };

        const sendMessage = async (text) => {
          if (!text.trim()) return;
          const userMsg = { role: "user", content: text.trim() };
          const newMsgs = [...messages, userMsg];
          saveMessages(newMsgs);
          setInput("");
          setLoading(true);
          try {
            const res = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 1000,
                system: buildSystem(),
                messages: newMsgs.slice(-14).map(m => ({ role: m.role, content: m.content })),
                tools: [{ type: "web_search_20250305", name: "web_search" }]
              })
            });
            const data = await res.json();
            let text2 = (data.content || []).map(b => b.type === "text" ? b.text : "").filter(Boolean).join("\n");
            const cleanText = processActions(text2);
            const assistantMsg = { role: "assistant", content: cleanText || "..." };
            const final = [...newMsgs, assistantMsg];
            saveMessages(final);

            // TTS
            if (ttsOn && cleanText && "speechSynthesis" in window) {
              const u = new SpeechSynthesisUtterance(cleanText.replace(/[*_#]/g, ""));
              u.lang = "es-MX";
              speechSynthesis.speak(u);
            }
          } catch (e) {
            const errMsg = { role: "assistant", content: "Error de conexión. Intenta de nuevo." };
            saveMessages([...newMsgs, errMsg]);
          }
          setLoading(false);
        };

        const startSTT = () => {
          if (!("webkitSpeechRecognition" in window || "SpeechRecognition" in window)) return;
          const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
          const r = new SR();
          r.lang = "es-MX";
          r.continuous = false;
          r.interimResults = false;
          r.onresult = (e) => { const t = e.results[0][0].transcript; setInput(t); setListening(false); };
          r.onerror = () => setListening(false);
          r.onend = () => setListening(false);
          recognitionRef.current = r;
          r.start();
          setListening(true);
        };

        const quickBtns = [
          { label: "📋 Briefing", msg: "Dame el briefing completo del día" },
          { label: "📅 Agenda", msg: "¿Qué tengo en la agenda de hoy?" },
          { label: "⚠️ Urgente", msg: "¿Qué es lo más urgente que debo atender?" },
          { label: "💰 Pagos", msg: "¿Qué pagos tengo próximos?" },
          { label: "🎯 Foco", msg: "¿En qué debería enfocarme ahora?" },
          { label: "💪 Motivar", msg: "Necesito motivación" },
        ];

        return (
          <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
            {/* Quick buttons */}
            <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 8, flexShrink: 0 }}>
              {quickBtns.map(q => (
                <button key={q.label} onClick={() => sendMessage(q.msg)} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 20, padding: "6px 12px", fontSize: 12, color: C.text, cursor: "pointer", whiteSpace: "nowrap" }}>{q.label}</button>
              ))}
            </div>

            {/* Messages */}
            <div style={{ flex: 1, overflowY: "auto", paddingBottom: 8 }}>
              {messages.length === 0 && (
                <div style={{ textAlign: "center", padding: "40px 20px", color: C.muted }}>
                  <div style={{ fontSize: 40, marginBottom: 12 }}>{MODES[mode].emoji}</div>
                  <div style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 20, letterSpacing: 3, color: MODES[mode].color }}>{MODES[mode].name.toUpperCase()}</div>
                  <div style={{ fontSize: 13, marginTop: 8 }}>Modo activo. ¿En qué te ayudo?</div>
                </div>
              )}
              {messages.map((m, i) => (
                <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start", marginBottom: 8, animation: "fadeIn 0.3s ease" }}>
                  <div style={{ maxWidth: "85%", padding: "10px 14px", borderRadius: m.role === "user" ? "14px 14px 4px 14px" : "14px 14px 14px 4px", background: m.role === "user" ? C.purple + "33" : C.card, border: `1px solid ${m.role === "user" ? C.purple + "44" : C.border}`, fontSize: 13, lineHeight: 1.5, whiteSpace: "pre-wrap" }}>{m.content}</div>
                </div>
              ))}
              {loading && (
                <div style={{ display: "flex", justifyContent: "flex-start", marginBottom: 8 }}>
                  <div style={{ padding: "10px 14px", borderRadius: "14px 14px 14px 4px", background: C.card, border: `1px solid ${C.border}`, fontSize: 13 }}>
                    <span style={{ animation: "pulse 1s infinite" }}>▋</span>
                  </div>
                </div>
              )}
              <div ref={chatEnd} />
            </div>

            {/* Input bar */}
            <div style={{ display: "flex", gap: 8, padding: "8px 0", flexShrink: 0, borderTop: `1px solid ${C.border}` }}>
              <button onClick={() => { setTtsOn(!ttsOn); persist("nx3_tts", !ttsOn); }} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "8px 10px", cursor: "pointer", fontSize: 16 }} title="Text-to-Speech">{ttsOn ? "🔊" : "🔇"}</button>
              <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && !e.shiftKey && (e.preventDefault(), sendMessage(input))} placeholder="Escribe..." style={{ ...s.input, flex: 1, borderRadius: 10 }} />
              <button onClick={startSTT} style={{ background: listening ? C.red : C.card, border: `1px solid ${listening ? C.red : C.border}`, borderRadius: 10, padding: "8px 10px", cursor: "pointer", fontSize: 16 }} title="Micrófono">🎙️</button>
              <button onClick={() => sendMessage(input)} style={{ ...s.btn(), borderRadius: 10, padding: "8px 14px" }}>➤</button>
            </div>
          </div>
        );
      }

      /* ═══════════════════ AGENDA ═══════════════════ */
      function Agenda() {
        const [view, setView] = useState("week");
        const [weekOffset, setWeekOffset] = useState(0);
        const [selectedDay, setSelectedDay] = useState(today);
        const [agendaFilter, setAgendaFilter] = useState("all");

        const weekDays = useMemo(() => {
          const d = new Date();
          d.setDate(d.getDate() - d.getDay() + 1 + weekOffset * 7);
          return Array.from({ length: 7 }, (_, i) => {
            const dd = new Date(d);
            dd.setDate(d.getDate() + i);
            return dd.toISOString().slice(0, 10);
          });
        }, [weekOffset]);

        const filteredEvents = useMemo(() => {
          let evs = events;
          if (agendaFilter !== "all") evs = evs.filter(e => e.type === agendaFilter);
          return evs;
        }, [events, agendaFilter]);

        const dayEvents = useMemo(() => filteredEvents.filter(e => e.date === selectedDay).sort((a, b) => (a.time || "").localeCompare(b.time || "")), [filteredEvents, selectedDay]);

        const listGroups = useMemo(() => {
          const groups = {};
          filteredEvents.sort((a, b) => (a.date || "").localeCompare(b.date || "")).forEach(e => {
            const d = e.date || "Sin fecha";
            if (!groups[d]) groups[d] = [];
            groups[d].push(e);
          });
          return Object.entries(groups);
        }, [filteredEvents]);

        const FILTERS = [
          { key: "all", label: "Todo" }, { key: "meeting", label: "🤝" }, { key: "call", label: "📞" }, { key: "task", label: "✅" }, { key: "personal", label: "🌟" },
        ];

        const dayHasEvents = (d) => events.some(e => e.date === d && e.status !== "done");
        const dayAllDone = (d) => { const de = events.filter(e => e.date === d); return de.length > 0 && de.every(e => e.status === "done"); };

        return (
          <div>
            {/* View toggle + filters */}
            <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
              <button onClick={() => setView("week")} style={{ ...s.btn(view === "week" ? C.purple : C.card), flex: 1, border: `1px solid ${view === "week" ? C.purple : C.border}`, fontSize: 12 }}>Semanal</button>
              <button onClick={() => setView("list")} style={{ ...s.btn(view === "list" ? C.purple : C.card), flex: 1, border: `1px solid ${view === "list" ? C.purple : C.border}`, fontSize: 12 }}>Lista</button>
            </div>
            <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
              {FILTERS.map(f => (
                <button key={f.key} onClick={() => setAgendaFilter(f.key)} style={{ background: agendaFilter === f.key ? C.purple + "33" : C.card, border: `1px solid ${agendaFilter === f.key ? C.purple : C.border}`, borderRadius: 20, padding: "4px 10px", fontSize: 12, color: agendaFilter === f.key ? C.teal : C.muted, cursor: "pointer" }}>{f.label}</button>
              ))}
            </div>

            {view === "week" ? (
              <div>
                {/* Week navigation */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <button onClick={() => setWeekOffset(weekOffset - 1)} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "6px 12px", color: C.text, cursor: "pointer" }}>◀</button>
                  <span style={{ fontSize: 12, color: C.muted, fontWeight: 600 }}>{fmtDate(weekDays[0])} — {fmtDate(weekDays[6])}</span>
                  <button onClick={() => setWeekOffset(weekOffset + 1)} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "6px 12px", color: C.text, cursor: "pointer" }}>▶</button>
                </div>
                {/* Day pills */}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, marginBottom: 12 }}>
                  {weekDays.map(d => (
                    <button key={d} onClick={() => setSelectedDay(d)} style={{ background: d === selectedDay ? C.purple + "33" : d === today ? C.card2 : C.card, border: `1px solid ${d === selectedDay ? C.purple : C.border}`, borderRadius: 10, padding: "8px 2px 6px", cursor: "pointer", textAlign: "center", position: "relative" }}>
                      <div style={{ fontSize: 9, color: C.muted, fontWeight: 600 }}>{dayName(d)}</div>
                      <div style={{ fontSize: 16, color: d === today ? C.teal : C.text, fontWeight: d === today ? 700 : 400 }}>{d.slice(8)}</div>
                      {dayHasEvents(d) && <div style={{ width: 5, height: 5, borderRadius: "50%", background: dayAllDone(d) ? C.green : C.orange, margin: "2px auto 0" }} />}
                    </button>
                  ))}
                </div>
                {/* Day events */}
                {dayEvents.length === 0 && <div style={{ textAlign: "center", padding: 20, color: C.muted, fontSize: 13 }}>Sin eventos para este día</div>}
                {dayEvents.map(ev => (
                  <div key={ev.id} style={{ ...s.card, borderLeft: `3px solid ${(EVENT_TYPES[ev.type] || {}).color || C.muted}`, display: "flex", gap: 10, alignItems: "flex-start", padding: 12 }}>
                    <button onClick={() => toggleEvent(ev.id)} style={{ width: 22, height: 22, borderRadius: 6, border: `2px solid ${ev.status === "done" ? C.green : C.muted}`, background: ev.status === "done" ? C.green : "transparent", cursor: "pointer", flexShrink: 0, fontSize: 11, color: "#fff" }}>{ev.status === "done" ? "✓" : ""}</button>
                    <div style={{ flex: 1 }} onClick={() => { setEditItem(ev); setModal("event"); }}>
                      <div style={{ fontSize: 13, fontWeight: 500, textDecoration: ev.status === "done" ? "line-through" : "none" }}>{ev.title}</div>
                      <div style={{ display: "flex", gap: 8, marginTop: 4, flexWrap: "wrap" }}>
                        <span style={s.tag((EVENT_TYPES[ev.type] || {}).color || C.muted)}>{(EVENT_TYPES[ev.type] || {}).emoji} {(EVENT_TYPES[ev.type] || {}).label}</span>
                        {ev.time && <span style={{ fontSize: 11, color: C.muted }}>🕐 {ev.time}</span>}
                        {ev.company && <span style={{ fontSize: 11, color: C.muted }}>🏢 {ev.company}</span>}
                      </div>
                    </div>
                    <button onClick={() => deleteEvent(ev.id)} style={{ background: "none", border: "none", color: C.red, fontSize: 14, cursor: "pointer", padding: 4 }}>✕</button>
                  </div>
                ))}
              </div>
            ) : (
              <div>
                {listGroups.map(([date, evs]) => (
                  <div key={date} style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: date === today ? C.green : date < today ? C.red : C.muted, letterSpacing: 1, marginBottom: 6, padding: "4px 0" }}>
                      {date === today ? "HOY" : date < today ? `PASADO — ${fmtDate(date)}` : fmtDate(date)} · {dayName(date)}
                    </div>
                    {evs.map(ev => (
                      <div key={ev.id} style={{ ...s.card, borderLeft: `3px solid ${(EVENT_TYPES[ev.type] || {}).color || C.muted}`, display: "flex", gap: 10, alignItems: "center", padding: 10 }}>
                        <button onClick={() => toggleEvent(ev.id)} style={{ width: 20, height: 20, borderRadius: 6, border: `2px solid ${ev.status === "done" ? C.green : C.muted}`, background: ev.status === "done" ? C.green : "transparent", cursor: "pointer", flexShrink: 0, fontSize: 10, color: "#fff" }}>{ev.status === "done" ? "✓" : ""}</button>
                        <span style={{ fontSize: 12, color: C.muted, width: 40, flexShrink: 0 }}>{ev.time || "--:--"}</span>
                        <span style={{ fontSize: 12, marginRight: 4 }}>{(EVENT_TYPES[ev.type] || {}).emoji}</span>
                        <span style={{ fontSize: 13, flex: 1, textDecoration: ev.status === "done" ? "line-through" : "none", opacity: ev.status === "done" ? 0.5 : 1 }}>{ev.title}</span>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            )}

            {/* FAB */}
            <button onClick={() => { setEditItem(null); setModal("event"); }} style={{ position: "fixed", bottom: 80, right: 20, width: 52, height: 52, borderRadius: "50%", background: C.grad, border: "none", color: "#fff", fontSize: 26, cursor: "pointer", boxShadow: "0 4px 20px rgba(124,58,237,0.4)", zIndex: 50 }}>+</button>
          </div>
        );
      }

      /* ═══════════════════ TASKS ═══════════════════ */
      function Tasks() {
        const [filter, setFilter] = useState("pending");
        const filtered = useMemo(() => {
          if (filter === "pending") return pendingTasks;
          if (filter === "done") return doneTasks;
          return tasks;
        }, [filter, tasks, pendingTasks, doneTasks]);

        return (
          <div>
            <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
              {[{ k: "pending", l: "Pendientes" }, { k: "done", l: "Hechas" }, { k: "all", l: "Todas" }].map(f => (
                <button key={f.k} onClick={() => setFilter(f.k)} style={{ background: filter === f.k ? C.purple + "33" : C.card, border: `1px solid ${filter === f.k ? C.purple : C.border}`, borderRadius: 20, padding: "5px 14px", fontSize: 12, color: filter === f.k ? C.teal : C.muted, cursor: "pointer", fontWeight: 600 }}>{f.l}</button>
              ))}
            </div>

            {filtered.length === 0 && <div style={{ textAlign: "center", padding: 30, color: C.muted, fontSize: 13 }}>{filter === "pending" ? "🎉 Sin tareas pendientes" : "Sin resultados"}</div>}

            {filtered.map(t => {
              const isOverdue = t.status !== "done" && t.dueDate && t.dueDate < today;
              const days = isOverdue ? daysDiff(today, t.dueDate) : 0;
              return (
                <div key={t.id} style={{ ...s.card, borderLeft: `3px solid ${isOverdue ? C.red : t.priority === "high" ? C.red : t.priority === "low" ? C.blue : C.yellow}`, display: "flex", gap: 10, alignItems: "flex-start", padding: 12 }}>
                  <button onClick={() => toggleTask(t.id)} style={{ width: 22, height: 22, borderRadius: 6, border: `2px solid ${t.status === "done" ? C.green : C.muted}`, background: t.status === "done" ? C.green : "transparent", cursor: "pointer", flexShrink: 0, fontSize: 11, color: "#fff", marginTop: 1 }}>{t.status === "done" ? "✓" : ""}</button>
                  <div style={{ flex: 1 }} onClick={() => { setEditItem(t); setModal("task"); }}>
                    <div style={{ fontSize: 13, fontWeight: 500, textDecoration: t.status === "done" ? "line-through" : "none", opacity: t.status === "done" ? 0.5 : 1 }}>{t.title}</div>
                    {t.notes && <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>{t.notes}</div>}
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 4 }}>
                      <span style={s.tag(t.priority === "high" ? C.red : t.priority === "low" ? C.blue : C.yellow)}>{t.priority === "high" ? "ALTA" : t.priority === "low" ? "BAJA" : "MEDIA"}</span>
                      {t.dueDate && <span style={{ fontSize: 11, color: isOverdue ? C.red : C.muted }}>{isOverdue ? `⚠️ ${days}d atrás` : fmtDate(t.dueDate)}</span>}
                      {t.company && <span style={{ fontSize: 11, color: C.muted }}>🏢 {t.company}</span>}
                      {t.project && <span style={{ fontSize: 11, color: C.muted }}>📁 {t.project}</span>}
                    </div>
                  </div>
                  <button onClick={() => deleteTask(t.id)} style={{ background: "none", border: "none", color: C.red, fontSize: 14, cursor: "pointer", padding: 4 }}>✕</button>
                </div>
              );
            })}

            <button onClick={() => { setEditItem(null); setModal("task"); }} style={{ position: "fixed", bottom: 80, right: 20, width: 52, height: 52, borderRadius: "50%", background: C.grad, border: "none", color: "#fff", fontSize: 26, cursor: "pointer", boxShadow: "0 4px 20px rgba(124,58,237,0.4)", zIndex: 50 }}>+</button>
          </div>
        );
      }

      /* ═══════════════════ MORE DRAWER ═══════════════════ */
      function MoreDrawer() {
        if (!showMore) return null;
        const tabs = [
          { key: "projects", label: "Proyectos", emoji: "🗂" },
          { key: "finance", label: "Finanzas", emoji: "💰" },
          { key: "routine", label: "Rutina", emoji: "⚡" },
          { key: "contacts", label: "Contactos", emoji: "👥" },
        ];

        return (
          <div style={s.modal}>
            <div style={s.overlay} onClick={() => setShowMore(false)} />
            <div style={{ ...s.sheet, maxHeight: "90vh" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                <span style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 22, letterSpacing: 4, background: C.grad, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>MÁS</span>
                <button onClick={() => setShowMore(false)} style={{ background: "none", border: "none", color: C.muted, fontSize: 20, cursor: "pointer" }}>✕</button>
              </div>
              <div style={{ display: "flex", gap: 4, marginBottom: 14, borderBottom: `1px solid ${C.border}`, paddingBottom: 8 }}>
                {tabs.map(t => (
                  <button key={t.key} onClick={() => setMoreTab(t.key)} style={{ flex: 1, background: moreTab === t.key ? C.purple + "22" : "transparent", border: "none", borderBottom: moreTab === t.key ? `2px solid ${C.purple}` : "2px solid transparent", padding: "8px 4px", fontSize: 11, color: moreTab === t.key ? C.teal : C.muted, cursor: "pointer", fontWeight: 600 }}>{t.emoji} {t.label}</button>
                ))}
              </div>

              {/* Projects tab */}
              {moreTab === "projects" && (
                <div>
                  {projects.map(proj => {
                    const pTasks = tasks.filter(t => t.project === proj.name);
                    const pDone = pTasks.filter(t => t.status === "done").length;
                    const pct = pTasks.length ? Math.round((pDone / pTasks.length) * 100) : 0;
                    return (
                      <div key={proj.id} style={s.card}>
                        <div style={{ display: "flex", justifyContent: "space-between" }}>
                          <div><span style={{ fontSize: 13, fontWeight: 600 }}>{proj.name}</span>{proj.company && <span style={{ fontSize: 11, color: C.muted, marginLeft: 8 }}>{proj.company}</span>}</div>
                          <span style={{ fontSize: 12, color: C.green, fontWeight: 600 }}>{pDone}/{pTasks.length}</span>
                        </div>
                        <div style={{ marginTop: 8, height: 4, background: C.card2, borderRadius: 4, overflow: "hidden" }}>
                          <div style={{ height: "100%", width: `${pct}%`, background: C.grad, borderRadius: 4 }} />
                        </div>
                      </div>
                    );
                  })}
                  <button onClick={() => setModal("project")} style={{ ...s.btn(), width: "100%", marginTop: 8 }}>+ Proyecto</button>
                </div>
              )}

              {/* Finance tab */}
              {moreTab === "finance" && (
                <div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 12 }}>
                    <div style={{ ...s.card, textAlign: "center", padding: 10 }}><div style={{ fontSize: 9, color: C.muted }}>INGRESOS</div><div style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 20, color: C.green }}>${monthFinance.income.toLocaleString()}</div></div>
                    <div style={{ ...s.card, textAlign: "center", padding: 10 }}><div style={{ fontSize: 9, color: C.muted }}>GASTOS</div><div style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 20, color: C.red }}>${monthFinance.expense.toLocaleString()}</div></div>
                    <div style={{ ...s.card, textAlign: "center", padding: 10 }}><div style={{ fontSize: 9, color: C.muted }}>NETO</div><div style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 20, color: monthFinance.net >= 0 ? C.green : C.red }}>${monthFinance.net.toLocaleString()}</div></div>
                  </div>
                  <div style={{ fontSize: 11, fontWeight: 600, color: C.muted, letterSpacing: 1, marginBottom: 6 }}>MOVIMIENTOS</div>
                  {monthFinance.items.sort((a, b) => (b.date || "").localeCompare(a.date || "")).slice(0, 10).map(f => (
                    <div key={f.id} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.border}` }}>
                      <div><div style={{ fontSize: 13 }}>{f.description}</div>{f.company && <div style={{ fontSize: 10, color: C.muted }}>{f.company}</div>}</div>
                      <span style={{ fontSize: 13, fontWeight: 600, color: f.ftype === "income" ? C.green : C.red }}>{f.ftype === "income" ? "+" : "-"}${(f.amount || 0).toLocaleString()}</span>
                    </div>
                  ))}
                  {payments.length > 0 && (
                    <div style={{ marginTop: 12 }}>
                      <div style={{ fontSize: 11, fontWeight: 600, color: C.orange, letterSpacing: 1, marginBottom: 6 }}>PAGOS RECURRENTES</div>
                      {payments.map(p => (
                        <div key={p.id} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px solid ${C.border}` }}>
                          <div><div style={{ fontSize: 13 }}>{p.name}</div>{p.company && <div style={{ fontSize: 10, color: C.muted }}>{p.company}</div>}</div>
                          <div style={{ textAlign: "right" }}><div style={{ fontSize: 13, fontWeight: 600, color: C.orange }}>${(p.amount || 0).toLocaleString()}</div><div style={{ fontSize: 10, color: C.muted }}>{fmtDate(p.nextDue)}</div></div>
                        </div>
                      ))}
                    </div>
                  )}
                  <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                    <button onClick={() => setModal("finance")} style={{ ...s.btn(), flex: 1, fontSize: 12 }}>+ Movimiento</button>
                    <button onClick={() => setModal("payment")} style={{ ...s.btn(C.orange), flex: 1, fontSize: 12 }}>+ Pago</button>
                  </div>
                </div>
              )}

              {/* Routine tab */}
              {moreTab === "routine" && (
                <div>
                  <div style={{ marginBottom: 10, height: 6, background: C.card2, borderRadius: 4, overflow: "hidden" }}>
                    <div style={{ height: "100%", width: `${routine.length ? (todayRoutineDone / routine.length) * 100 : 0}%`, background: C.grad, borderRadius: 4 }} />
                  </div>
                  <div style={{ fontSize: 12, color: C.muted, textAlign: "center", marginBottom: 12 }}>{todayRoutineDone} de {routine.length} completados hoy</div>
                  {routine.map(h => {
                    const done = routineLog[today]?.[h.id];
                    return (
                      <div key={h.id} style={{ ...s.card, display: "flex", alignItems: "center", gap: 12, padding: 12 }}>
                        <button onClick={() => toggleRoutineItem(h.id)} style={{ width: 22, height: 22, borderRadius: 6, border: `2px solid ${done ? C.green : C.muted}`, background: done ? C.green : "transparent", cursor: "pointer", flexShrink: 0, fontSize: 11, color: "#fff" }}>{done ? "✓" : ""}</button>
                        <span style={{ fontSize: 18 }}>{h.icon}</span>
                        <span style={{ fontSize: 13, flex: 1, textDecoration: done ? "line-through" : "none", opacity: done ? 0.5 : 1 }}>{h.title}</span>
                        <button onClick={() => saveRoutine(routine.filter(r => r.id !== h.id))} style={{ background: "none", border: "none", color: C.red, fontSize: 12, cursor: "pointer" }}>✕</button>
                      </div>
                    );
                  })}
                  <button onClick={() => setModal("habit")} style={{ ...s.btn(), width: "100%", marginTop: 8 }}>+ Hábito</button>
                </div>
              )}

              {/* Contacts tab */}
              {moreTab === "contacts" && (
                <div>
                  {contacts.map(c => (
                    <div key={c.id} style={{ ...s.card, padding: 12 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                        <div>
                          <div style={{ fontSize: 14, fontWeight: 600 }}>{c.name}</div>
                          {c.company && <div style={{ fontSize: 11, color: C.muted }}>🏢 {c.company}</div>}
                          {c.phone && <div style={{ fontSize: 12, color: C.teal, marginTop: 2 }}>📱 {c.phone}</div>}
                          {c.notes && <div style={{ fontSize: 11, color: C.muted, marginTop: 4 }}>{c.notes}</div>}
                        </div>
                        <button onClick={() => saveContacts(contacts.filter(x => x.id !== c.id))} style={{ background: "none", border: "none", color: C.red, fontSize: 12, cursor: "pointer" }}>✕</button>
                      </div>
                    </div>
                  ))}
                  <button onClick={() => setModal("contact")} style={{ ...s.btn(), width: "100%", marginTop: 8 }}>+ Contacto</button>
                </div>
              )}
            </div>
          </div>
        );
      }

      /* ═══════════════════ MODALS ═══════════════════ */
      function ModalForm() {
        if (!modal) return null;
        const [form, setForm] = useState(() => {
          if (editItem) return { ...editItem };
          switch (modal) {
            case "task": return { title: "", dueDate: today, priority: "medium", company: "", project: "", notes: "" };
            case "event": return { title: "", date: today, time: "", type: "meeting", company: "", contact: "", notes: "", reminders: [15] };
            case "payment": return { name: "", amount: "", nextDue: today, company: "" };
            case "project": return { name: "", company: "" };
            case "contact": return { name: "", phone: "", company: "", notes: "" };
            case "finance": return { ftype: "expense", amount: "", description: "", company: "", date: today };
            case "habit": return { title: "", icon: "⭐" };
            default: return {};
          }
        });

        const up = (k, v) => setForm(p => ({ ...p, [k]: v }));

        const submit = () => {
          switch (modal) {
            case "task":
              if (!form.title.trim()) return;
              if (editItem) saveTasks(tasks.map(t => t.id === editItem.id ? { ...t, ...form } : t));
              else saveTasks([...tasks, { id: uid(), ...form, status: "pending" }]);
              break;
            case "event":
              if (!form.title.trim()) return;
              if (editItem) saveEvents(events.map(e => e.id === editItem.id ? { ...e, ...form } : e));
              else saveEvents([...events, { id: uid(), ...form, status: "pending" }]);
              break;
            case "payment":
              if (!form.name.trim()) return;
              if (editItem) savePayments(payments.map(p => p.id === editItem.id ? { ...p, ...form, amount: parseFloat(form.amount) || 0 } : p));
              else savePayments([...payments, { id: uid(), ...form, amount: parseFloat(form.amount) || 0 }]);
              break;
            case "project":
              if (!form.name.trim()) return;
              saveProjects([...projects, { id: uid(), ...form }]);
              break;
            case "contact":
              if (!form.name.trim()) return;
              saveContacts([...contacts, { id: uid(), ...form }]);
              break;
            case "finance":
              if (!form.description.trim()) return;
              saveFinance([...finance, { id: uid(), ...form, amount: parseFloat(form.amount) || 0 }]);
              break;
            case "habit":
              if (!form.title.trim()) return;
              saveRoutine([...routine, { id: uid(), ...form }]);
              break;
          }
          setModal(null);
          setEditItem(null);
        };

        const F = (label, key, type = "text", extra) => (
          <div style={{ marginBottom: 10 }}>
            <label style={{ fontSize: 11, color: C.muted, fontWeight: 600, display: "block", marginBottom: 4, letterSpacing: 0.5 }}>{label}</label>
            {extra || <input type={type} value={form[key] || ""} onChange={e => up(key, e.target.value)} style={s.input} list={key === "company" ? "company-list" : undefined} />}
          </div>
        );

        const toggleReminder = (val) => {
          const cur = form.reminders || [];
          up("reminders", cur.includes(val) ? cur.filter(v => v !== val) : [...cur, val]);
        };

        return (
          <div style={s.modal}>
            <div style={s.overlay} onClick={() => { setModal(null); setEditItem(null); }} />
            <div style={s.sheet}>
              <div style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 20, letterSpacing: 3, marginBottom: 14, color: C.teal }}>
                {editItem ? "EDITAR" : "NUEVO"} {modal === "task" ? "TAREA" : modal === "event" ? "EVENTO" : modal === "payment" ? "PAGO" : modal === "project" ? "PROYECTO" : modal === "contact" ? "CONTACTO" : modal === "finance" ? "MOVIMIENTO" : "HÁBITO"}
              </div>

              {modal === "task" && (<>
                {F("Título", "title")}
                {F("Fecha límite", "dueDate", "date")}
                {F("Prioridad", "priority", "text",
                  <div style={{ display: "flex", gap: 6 }}>
                    {["high", "medium", "low"].map(p => (
                      <button key={p} onClick={() => up("priority", p)} style={{ flex: 1, padding: "8px", borderRadius: 8, border: `1px solid ${form.priority === p ? (p === "high" ? C.red : p === "low" ? C.blue : C.yellow) : C.border}`, background: form.priority === p ? (p === "high" ? C.red : p === "low" ? C.blue : C.yellow) + "22" : C.card, color: form.priority === p ? C.text : C.muted, fontSize: 12, cursor: "pointer", fontWeight: 600 }}>{p === "high" ? "Alta" : p === "low" ? "Baja" : "Media"}</button>
                    ))}
                  </div>
                )}
                {F("Empresa", "company")}
                {F("Proyecto", "project", "text", <select value={form.project || ""} onChange={e => up("project", e.target.value)} style={{ ...s.input, appearance: "auto" }}><option value="">Sin proyecto</option>{projects.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}</select>)}
                {F("Notas", "notes", "text", <textarea value={form.notes || ""} onChange={e => up("notes", e.target.value)} style={{ ...s.input, minHeight: 60, resize: "vertical" }} />)}
              </>)}

              {modal === "event" && (<>
                {F("Título", "title")}
                {F("Fecha", "date", "date")}
                {F("Hora", "time", "time")}
                {F("Tipo", "type", "text",
                  <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                    {Object.entries(EVENT_TYPES).map(([k, v]) => (
                      <button key={k} onClick={() => up("type", k)} style={{ padding: "6px 10px", borderRadius: 8, border: `1px solid ${form.type === k ? v.color : C.border}`, background: form.type === k ? v.color + "22" : C.card, color: form.type === k ? v.color : C.muted, fontSize: 11, cursor: "pointer" }}>{v.emoji} {v.label}</button>
                    ))}
                  </div>
                )}
                {F("Empresa", "company")}
                {F("Contacto", "contact")}
                {F("Notas", "notes", "text", <textarea value={form.notes || ""} onChange={e => up("notes", e.target.value)} style={{ ...s.input, minHeight: 60, resize: "vertical" }} />)}
                {F("Recordatorios", "reminders", "text",
                  <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                    {REMINDER_OPTIONS.map(r => (
                      <button key={r.value} onClick={() => toggleReminder(r.value)} style={{ padding: "5px 10px", borderRadius: 8, border: `1px solid ${(form.reminders || []).includes(r.value) ? C.teal : C.border}`, background: (form.reminders || []).includes(r.value) ? C.teal + "22" : C.card, color: (form.reminders || []).includes(r.value) ? C.teal : C.muted, fontSize: 11, cursor: "pointer" }}>{r.label}</button>
                    ))}
                  </div>
                )}
              </>)}

              {modal === "payment" && (<>
                {F("Nombre", "name")}
                {F("Monto", "amount", "number")}
                {F("Próximo pago", "nextDue", "date")}
                {F("Empresa", "company")}
              </>)}

              {modal === "project" && (<>
                {F("Nombre", "name")}
                {F("Empresa", "company")}
              </>)}

              {modal === "contact" && (<>
                {F("Nombre", "name")}
                {F("Teléfono", "phone", "tel")}
                {F("Empresa", "company")}
                {F("Notas", "notes", "text", <textarea value={form.notes || ""} onChange={e => up("notes", e.target.value)} style={{ ...s.input, minHeight: 60, resize: "vertical" }} />)}
              </>)}

              {modal === "finance" && (<>
                {F("Tipo", "ftype", "text",
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={() => up("ftype", "income")} style={{ flex: 1, padding: 10, borderRadius: 8, border: `1px solid ${form.ftype === "income" ? C.green : C.border}`, background: form.ftype === "income" ? C.green + "22" : C.card, color: form.ftype === "income" ? C.green : C.muted, fontSize: 13, cursor: "pointer", fontWeight: 600 }}>💵 Ingreso</button>
                    <button onClick={() => up("ftype", "expense")} style={{ flex: 1, padding: 10, borderRadius: 8, border: `1px solid ${form.ftype === "expense" ? C.red : C.border}`, background: form.ftype === "expense" ? C.red + "22" : C.card, color: form.ftype === "expense" ? C.red : C.muted, fontSize: 13, cursor: "pointer", fontWeight: 600 }}>💸 Gasto</button>
                  </div>
                )}
                {F("Monto", "amount", "number")}
                {F("Descripción", "description")}
                {F("Empresa", "company")}
                {F("Fecha", "date", "date")}
              </>)}

              {modal === "habit" && (<>
                {F("Nombre del hábito", "title")}
                {F("Icono", "icon", "text",
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {["⭐", "💧", "🏃", "📖", "🧘", "💊", "🥗", "😴", "✍️", "🎯"].map(icon => (
                      <button key={icon} onClick={() => up("icon", icon)} style={{ width: 36, height: 36, borderRadius: 8, border: `1px solid ${form.icon === icon ? C.teal : C.border}`, background: form.icon === icon ? C.teal + "22" : C.card, fontSize: 18, cursor: "pointer" }}>{icon}</button>
                    ))}
                  </div>
                )}
              </>)}

              <datalist id="company-list">
                {companies.map(c => <option key={c} value={c} />)}
              </datalist>

              <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
                <button onClick={() => { setModal(null); setEditItem(null); }} style={{ ...s.btn(C.card), flex: 1, border: `1px solid ${C.border}` }}>Cancelar</button>
                <button onClick={submit} style={{ ...s.btn(), flex: 2 }}>Guardar</button>
              </div>
            </div>
          </div>
        );
      }

      /* ═══════════════════ REMINDER OVERLAY ═══════════════════ */
      function ReminderOverlay() {
        if (!reminder) return null;
        return (
          <div style={{ position: "fixed", inset: 0, zIndex: 300, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
            <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.85)", backdropFilter: "blur(8px)" }} />
            <div style={{ position: "relative", background: C.card, border: `1px solid ${C.border}`, borderRadius: 20, padding: 24, maxWidth: 360, width: "100%", textAlign: "center", animation: "fadeIn 0.3s ease" }}>
              <div style={{ fontSize: 48, marginBottom: 12 }}>{reminder.reminderType === "overdue" ? "⚠️" : "🔔"}</div>
              <div style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 22, letterSpacing: 3, color: reminder.reminderType === "overdue" ? C.red : C.teal, marginBottom: 8 }}>
                {reminder.reminderType === "overdue" ? "TAREAS VENCIDAS" : reminder.minBefore > 0 ? `EN ${reminder.minBefore} MIN` : "AHORA"}
              </div>
              <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 4 }}>{reminder.title}</div>
              {reminder.time && <div style={{ fontSize: 14, color: C.muted, marginBottom: 8 }}>🕐 {reminder.time}</div>}
              {reminder.company && <div style={{ fontSize: 12, color: C.muted }}>🏢 {reminder.company}</div>}
              <div style={{ display: "flex", gap: 8, marginTop: 20, flexDirection: "column" }}>
                {!reminder.reminderType !== "overdue" && reminder.id && (
                  <button onClick={() => { toggleEvent(reminder.id); setReminder(null); }} style={{ ...s.btn(C.green), width: "100%" }}>✅ YA LO HICE</button>
                )}
                <button onClick={() => snoozeReminder(reminder.id || "tasks", 30)} style={{ ...s.btn(C.yellow), width: "100%" }}>⏰ Recordar en 30 min</button>
                <button onClick={() => snoozeReminder(reminder.id || "tasks", 120)} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 18px", color: C.muted, fontSize: 13, cursor: "pointer" }}>Ignorar 2 horas</button>
              </div>
            </div>
          </div>
        );
      }

      /* ═══════════════════ RENDER ═══════════════════ */
      return (
        <div style={s.root}>
          {showModeSelect && <ModeSelect />}
          <ReminderOverlay />
          <ModalForm />
          <MoreDrawer />

          {/* Header */}
          <div style={s.header}>
            <div style={s.logo}>NEXUS</div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <button onClick={() => setShowModeSelect(true)} style={{ background: MODES[mode].color + "22", border: `1px solid ${MODES[mode].color}44`, borderRadius: 20, padding: "4px 10px", fontSize: 12, color: MODES[mode].color, cursor: "pointer" }}>{MODES[mode].emoji} {MODES[mode].name}</button>
            </div>
          </div>

          {/* Main content */}
          <div style={s.main}>
            {tab === "dashboard" && <Dashboard />}
            {tab === "chat" && <Chat />}
            {tab === "agenda" && <Agenda />}
            {tab === "tasks" && <Tasks />}
          </div>

          {/* Bottom nav */}
          <nav style={s.nav}>
            {[
              { key: "dashboard", label: "HOY", icon: "◉", badge: overdueTasks.length || null, badgeColor: C.red },
              { key: "chat", label: "NEXUS", icon: "◈" },
              { key: "agenda", label: "AGENDA", icon: "📅", badge: pendingTodayEvents.length || null, badgeColor: C.orange },
              { key: "tasks", label: "TAREAS", icon: "▣", badge: pendingTasks.length || null, badgeColor: C.yellow },
              { key: "more", label: "MÁS", icon: "⊞" },
            ].map(n => (
              <button key={n.key} onClick={() => n.key === "more" ? setShowMore(true) : setTab(n.key)} style={s.navBtn(tab === n.key || (n.key === "more" && showMore))}>
                {n.badge && <span style={s.badge(n.badgeColor)}>{n.badge}</span>}
                <span style={{ fontSize: 18 }}>{n.icon}</span>
                <span style={{ fontFamily: "'Bebas Neue', cursive", letterSpacing: 2 }}>{n.label}</span>
              </button>
            ))}
          </nav>
        </div>
      );
    }

    // Expose NEXUS globally for the render script
    window.NEXUS = NEXUS;
  </script>

  <!-- RENDER: This script MUST be outside the type="text/babel" block -->
  <script>
    // Wait for Babel to transpile and execute
    function waitForNexus() {
      if (window.NEXUS) {
        var container = document.getElementById('root');
        var root = ReactDOM.createRoot(container);
        root.render(React.createElement(window.NEXUS));
      } else {
        setTimeout(waitForNexus, 50);
      }
    }
    waitForNexus();
  </script>
</body>
</html>
