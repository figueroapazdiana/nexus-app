<script type="text/babel">
import { useState, useEffect, useRef, useCallback } from "react";


const injectFonts = () => {
  if (document.getElementById("nx3-fonts")) return;
  const l = document.createElement("link");
  l.id = "nx3-fonts"; l.rel = "stylesheet";
  l.href = "https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap";
  document.head.appendChild(l);
};

// Dot-grid background CSS
const injectGlobalStyles = () => {
  if (document.getElementById("nx3-global")) return;
  const s = document.createElement("style");
  s.id = "nx3-global";
  s.textContent = [
    "body { background: #04040a !important; margin: 0; }",
    "::-webkit-scrollbar { width: 3px; background: transparent; }",
    "::-webkit-scrollbar-thumb { background: #1e1e30; border-radius: 2px; }"
  ].join(" ");
  document.head.appendChild(s);
};

const C = {
  bg: "#04040a", card: "#09090f", border: "#141420",
  teal: "#a78bfa",    // violet accent
  pink: "#f472b6",    // pink accent
  yellow: "#fb923c",  // orange (SaleADS stat color)
  purple: "#8b5cf6",  // purple
  red: "#f43f5e",     // red
  green: "#34d399",   // green
  orange: "#f97316",  // orange gradient end
  blue: "#818cf8",    // indigo
  text: "#f1f5f9", muted: "#334155",
  grad: "linear-gradient(135deg, #7c3aed, #ea580c)", // purple→orange CTA gradient
};

const MODES = {
  ejecutivo: { name: "Ejecutivo", emoji: "🎯", color: "#a78bfa", prompt: "Eres un COO de élite. Directo, eficiente, sin rodeos. Cada respuesta es concisa y accionable. Máxima eficiencia, cero relleno." },
  coach:     { name: "Coach",     emoji: "💪", color: "#f472b6", prompt: "Coach brutalmente honesto. Sin excusas. Si hay tareas vencidas, confrontas directamente. Regañas cuando es necesario. CAPS para énfasis." },
  fun:       { name: "Fun",       emoji: "😂", color: "#fb923c", prompt: "Divertido e irreverente. Humor inteligente sobre productividad. Bromas sobre procrastinación pero siempre llevando a la acción." },
  hype:      { name: "Hype",      emoji: "🔥", color: "#f97316", prompt: "El hype man definitivo. Cada logro es ÉPICO. Energía pura contagiosa. Celebras hasta los avances pequeños. CAPS frecuentes." },
  zen:       { name: "Zen",       emoji: "🧘", color: "#818cf8", prompt: "Calmo, sabio, estratégico. Perspectiva elevada. Ayudas a ver el panorama completo sin estrés. Claridad sobre caos." },
  savage:    { name: "Savage",    emoji: "😤", color: "#f43f5e", prompt: "Sin filtros absolutos. No toleras excusas. Lenguaje directo al punto de ser incómodo. Cada tarea vencida es inaceptable. Obligas a actuar AHORA." },
};

const EVENT_TYPES = {
  meeting:  { label: "Reunión",   emoji: "🤝", color: C.teal },
  call:     { label: "Llamada",   emoji: "📞", color: C.green },
  task:     { label: "Pendiente", emoji: "✅", color: C.yellow },
  personal: { label: "Personal",  emoji: "🌟", color: C.purple },
  payment:  { label: "Pago",      emoji: "💰", color: C.orange },
};

const REMINDER_OPTIONS = [
  { value: 0,    label: "A la hora exacta" },
  { value: 5,    label: "5 min antes" },
  { value: 10,   label: "10 min antes" },
  { value: 15,   label: "15 min antes" },
  { value: 30,   label: "30 min antes" },
  { value: 60,   label: "1 hora antes" },
  { value: 120,  label: "2 horas antes" },
  { value: 1440, label: "1 día antes" },
];

const todayStr  = () => new Date().toISOString().split("T")[0];
const uid       = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const fmtDate   = d => d ? new Date(d + "T12:00:00").toLocaleDateString("es-MX", { day: "numeric", month: "short" }) : "";
const fmtDay    = d => d ? new Date(d + "T12:00:00").toLocaleDateString("es-MX", { weekday: "short" }) : "";
const daysUntil = d => { if (!d) return 999; return Math.round((new Date(d + "T12:00:00") - new Date(todayStr() + "T12:00:00")) / 86400000); };
const priColor  = p => ({ high: C.red, medium: C.yellow, low: C.green }[p] || C.muted);
const COMPANY_COLORS = [C.teal, C.pink, C.yellow, C.purple, C.orange, C.blue, C.green, C.red, "#ff9900", "#00ccff"];

// ─── get week days starting Monday ────────────────────────────────────────────
const getWeekDays = (offsetWeeks = 0) => {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1) + offsetWeeks * 7);
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d.toISOString().split("T")[0];
  });
};

export default function NEXUS() {
  injectFonts();
  injectGlobalStyles();

  // ── CORE STATE ──────────────────────────────────────────────────────────
  const [tab, setTab] = useState("dashboard");
  const [mode, setMode] = useState("ejecutivo");
  const [showModeSelect, setShowModeSelect] = useState(false);
  const [showMore, setShowMore] = useState(false);
  const [moreSection, setMoreSection] = useState("projects");

  // ── DATA ────────────────────────────────────────────────────────────────
  const [tasks,      setTasks]      = useState([]);
  const [payments,   setPayments]   = useState([]);
  const [projects,   setProjects]   = useState([]);
  const [contacts,   setContacts]   = useState([]);
  const [finance,    setFinance]    = useState([]);
  const [routine,    setRoutine]    = useState([]);
  const [routineLog, setRoutineLog] = useState({});
  const [events,     setEvents]     = useState([]); // NEW: agenda events
  const [messages,   setMessages]   = useState([{
    id: "boot", role: "assistant", mode: "ejecutivo",
    text: "NEXUS v3 activado. 🎯\n\nAhora tengo agenda completa con calendario semanal, reuniones, llamadas y pendientes con checkbox. Dime todo lo que tienes en la cabeza."
  }]);

  // ── UI STATE ────────────────────────────────────────────────────────────
  const [input,       setInput]       = useState("");
  const [loading,     setLoading]     = useState(false);
  const [listening,   setListening]   = useState(false);
  const [ttsEnabled,  setTtsEnabled]  = useState(true);
  const [modal,       setModal]       = useState(null);
  const [reminderTask,setReminderTask]= useState(null);
  const [snoozed,     setSnoozed]     = useState({});
  const [followUpQueue, setFollowUpQueue] = useState({}); // { id: triggerTimestamp }
  const [followUpTarget, setFollowUpTarget] = useState(null);
  const [notifPerm,   setNotifPerm]   = useState("default");
  const [showFinance,  setShowFinance]  = useState(false);
  const [unifiedFilter, setUnifiedFilter] = useState("all"); // all|meeting|call|task|personal|projects
  const [taskFilter,  setTaskFilter]  = useState("pending");
  // Agenda specific
  const [agendaView,  setAgendaView]  = useState("week"); // "week" | "list"
  const [agendaFilter,setAgendaFilter]= useState("all");  // "all"|"meeting"|"call"|"task"|"personal"
  const [weekOffset,  setWeekOffset]  = useState(0);
  const [selectedDay, setSelectedDay] = useState(todayStr());

  // ── FORMS ───────────────────────────────────────────────────────────────
  const [newTask,    setNewTask]    = useState({ title: "", dueDate: todayStr(), project: "", company: "", priority: "medium", notes: "" });
  const [newPay,     setNewPay]     = useState({ name: "", amount: "", nextDue: todayStr(), company: "Personal" });
  const [newProj,    setNewProj]    = useState({ name: "", company: "" });
  const [newContact, setNewContact] = useState({ name: "", phone: "", company: "", notes: "" });
  const [newFinance, setNewFinance] = useState({ type: "income", amount: "", description: "", company: "", date: todayStr() });
  const [newHabit,   setNewHabit]   = useState({ title: "", icon: "⭐", time: "", reminders: [0] });
  const [newEvent,   setNewEvent]   = useState({ title: "", date: todayStr(), time: "09:00", type: "meeting", company: "", contact: "", notes: "", status: "pending", reminders: [15] });

  // ── REFS ────────────────────────────────────────────────────────────────
  const chatRef  = useRef(null);
  const inputRef = useRef(null);
  const recRef   = useRef(null);

  // ── STORAGE ─────────────────────────────────────────────────────────────
  const persist = useCallback((key, val) => {
    // Save locally for instant UI
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}

  }, []);

  useEffect(() => {
    const KEYS = [
      ["nx3_tasks", setTasks], ["nx3_payments", setPayments],
      ["nx3_projects", setProjects], ["nx3_contacts", setContacts],
      ["nx3_finance", setFinance], ["nx3_routine", setRoutine],
      ["nx3_routinelog", setRoutineLog], ["nx3_events", setEvents],
      ["nx3_messages", v => { if (v?.length) setMessages(v); }],
      ["nx3_mode", v => { if (v) setMode(v); }],
      ["nx3_tts", v => { if (v !== undefined) setTtsEnabled(v); }],
    ];

    // 1. Load from localStorage immediately (instant UI)
    KEYS.forEach(([key, setter]) => {
      try { const v = localStorage.getItem(key); if (v) setter(JSON.parse(v)); } catch {}
    });
    try {
      const md = localStorage.getItem("nx3_modeday");
      if (!md || JSON.parse(md) !== todayStr()) setShowModeSelect(true);
    } catch { setShowModeSelect(true); }



    if ("Notification" in window) setNotifPerm(Notification.permission);
  }, []);

  const saveTasks    = fn => setTasks(p    => { const n = typeof fn === "function" ? fn(p) : fn; persist("nx3_tasks",      n); return n; });
  const savePays     = fn => setPayments(p => { const n = typeof fn === "function" ? fn(p) : fn; persist("nx3_payments",   n); return n; });
  const saveProjs    = fn => setProjects(p => { const n = typeof fn === "function" ? fn(p) : fn; persist("nx3_projects",   n); return n; });
  const saveContacts = fn => setContacts(p => { const n = typeof fn === "function" ? fn(p) : fn; persist("nx3_contacts",   n); return n; });
  const saveFinance  = fn => setFinance(p  => { const n = typeof fn === "function" ? fn(p) : fn; persist("nx3_finance",    n); return n; });
  const saveRoutine  = fn => setRoutine(p  => { const n = typeof fn === "function" ? fn(p) : fn; persist("nx3_routine",    n); return n; });
  const saveRLog     = fn => setRoutineLog(p => { const n = typeof fn === "function" ? fn(p) : fn; persist("nx3_routinelog", n); return n; });
  const saveEvents   = fn => setEvents(p   => { const n = typeof fn === "function" ? fn(p) : fn; persist("nx3_events",     n); return n; });
  const saveMsgs     = fn => setMessages(p => { const n = typeof fn === "function" ? fn(p) : fn; persist("nx3_messages",   n.slice(-60)); return n; });

  // ── TTS ─────────────────────────────────────────────────────────────────
  const speak = useCallback(text => {
    if (!ttsEnabled || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const clean = text.replace(/[*#►\[\]{}→◈▣◉◆⊞]/g, "").replace(/\n+/g, ". ").slice(0, 350);
    const doSpeak = () => {
      const u = new SpeechSynthesisUtterance(clean);
      u.lang = "es-MX"; u.rate = 1.05; u.pitch = 1.0;
      const voices = window.speechSynthesis.getVoices();
      const esV = voices.find(v => v.lang === "es-MX") || voices.find(v => v.lang.startsWith("es")) || voices[0];
      if (esV) u.voice = esV;
      window.speechSynthesis.speak(u);
    };
    if (window.speechSynthesis.getVoices().length > 0) doSpeak();
    else window.speechSynthesis.onvoiceschanged = doSpeak;
  }, [ttsEnabled]);

  // ── STT ─────────────────────────────────────────────────────────────────
  const startVoice = useCallback(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert("Usa Chrome para voz"); return; }
    if (listening) { recRef.current?.stop(); return; }
    const r = new SR();
    r.lang = "es-MX"; r.interimResults = false; r.maxAlternatives = 1;
    recRef.current = r;
    r.onstart  = () => setListening(true);
    r.onend    = () => setListening(false);
    r.onerror  = () => setListening(false);
    r.onresult = e => {
      const t = e.results[0][0].transcript;
      setInput(prev => (prev ? prev + " " : "") + t);
      inputRef.current?.focus();
    };
    r.start();
  }, [listening]);

  // ── NOTIFICATIONS ───────────────────────────────────────────────────────
  const requestNotif = async () => {
    const p = await Notification.requestPermission();
    setNotifPerm(p);
    if (p === "granted") new Notification("NEXUS activado", { body: "Notificaciones activas. No habrá descanso." });
  };
  const pushNotif = useCallback((title, body) => {
    if (notifPerm === "granted") try { new Notification("NEXUS: " + title, { body }); } catch {}
  }, [notifPerm]);

  // ── MINUTE-LEVEL CLOCK + ADVANCE REMINDERS + FOLLOW-UP ─────────────────
  useEffect(() => {
    const firedRef = { current: new Set() }; // track fired reminders this session

    const tick = () => {
      const now = new Date();
      const nowMs = now.getTime();
      const todayS = todayStr();
      const hhmm = now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0");

      // Helper: compute reminder fire time for an event
      const getReminderTimes = (e) => {
        if (!e.time || e.date !== todayS) return [];
        const [h, m] = e.time.split(":").map(Number);
        const baseMs = new Date(todayS + "T" + e.time + ":00").getTime();
        return (e.reminders || [0]).map(minBefore => ({
          minBefore,
          fireHHMM: (() => {
            const d = new Date(baseMs - minBefore * 60000);
            return d.getHours().toString().padStart(2,"0") + ":" + d.getMinutes().toString().padStart(2,"0");
          })()
        }));
      };

      // 1. Check follow-up queue
      const dueFU = Object.entries(followUpQueue).find(([, ts]) => nowMs >= ts);
      if (dueFU && !followUpTarget && !reminderTask) {
        const [fid] = dueFU;
        const ev = events.find(e => e.id === fid && e.status !== "done");
        const rout = routine.find(r => r.id === fid);
        const routDone = rout ? !!((routineLog[todayS]||{})[fid]) : true;
        const target = ev || (!routDone && rout ? rout : null);
        if (target) {
          const lbl = ev ? (EVENT_TYPES[target.type]?.label || "Evento") : "Rutina";
          speak(`Han pasado 15 minutos. ¿Ya completaste: ${target.title}?`);
          pushNotif("❓ ¿Lo cumpliste?", target.title);
          setFollowUpTarget({ ...target, isFollowUp: true, isRoutineFollowUp: !!rout });
        }
        setFollowUpQueue(q => { const n={...q}; delete n[fid]; return n; });
        return;
      }

      if (reminderTask || followUpTarget) return;

      // 2. Advance + exact reminders for events
      for (const ev of events) {
        if (ev.status === "done") continue;
        if (snoozed[ev.id] && snoozed[ev.id] > nowMs) continue;
        const reminderTimes = getReminderTimes(ev);
        for (const { minBefore, fireHHMM } of reminderTimes) {
          if (fireHHMM !== hhmm) continue;
          const fireKey = `${ev.id}-${minBefore}`;
          if (firedRef.current.has(fireKey)) continue;
          firedRef.current.add(fireKey);
          const isNow = minBefore === 0;
          const label = isNow ? "ES HORA" : `EN ${minBefore < 60 ? minBefore + " MIN" : (minBefore/60) + "H"}`;
          speak(isNow
            ? `Es hora. ${EVENT_TYPES[ev.type]?.label}: ${ev.title}.`
            : `Recordatorio. En ${minBefore < 60 ? minBefore + " minutos" : (minBefore/60 === 1 ? "una hora" : (minBefore/60) + " horas")}: ${ev.title}.`
          );
          pushNotif(`⏰ ${label}: ${EVENT_TYPES[ev.type]?.label}`, ev.title);
          if (isNow) setFollowUpQueue(q => ({ ...q, [ev.id]: nowMs + 15 * 60 * 1000 }));
          setReminderTask({ ...ev, isExactTime: isNow, isAdvance: !isNow, minBefore });
          return;
        }
      }

      // 3. Advance + exact reminders for routine habits
      for (const r of routine) {
        if (!r.time || (routineLog[todayS]||{})[r.id]) continue;
        if (snoozed[r.id] && snoozed[r.id] > nowMs) continue;
        const reminders = r.reminders || [0];
        const baseMs = new Date(todayS + "T" + r.time + ":00").getTime();
        for (const minBefore of reminders) {
          const fireD = new Date(baseMs - minBefore * 60000);
          const fireHHMM = fireD.getHours().toString().padStart(2,"0") + ":" + fireD.getMinutes().toString().padStart(2,"0");
          if (fireHHMM !== hhmm) continue;
          const fireKey = `${r.id}-${minBefore}`;
          if (firedRef.current.has(fireKey)) continue;
          firedRef.current.add(fireKey);
          const isNow = minBefore === 0;
          speak(isNow
            ? `Hora de tu rutina: ${r.title}.`
            : `En ${minBefore < 60 ? minBefore + " minutos" : "una hora"}: ${r.title}.`
          );
          pushNotif(isNow ? "⭐ RUTINA AHORA" : `⭐ EN ${minBefore} MIN`, r.title);
          if (isNow) setFollowUpQueue(q => ({ ...q, [r.id]: nowMs + 15 * 60 * 1000 }));
          setReminderTask({ ...r, isRoutine: true, isExactTime: isNow, isAdvance: !isNow, minBefore });
          return;
        }
      }

      // 4. Overdue tasks every 10 min
      if (now.getMinutes() % 10 === 0) {
        const overdue = tasks.filter(t => t.status !== "done" && t.dueDate < todayS && (!snoozed[t.id] || snoozed[t.id] < nowMs));
        if (overdue[0]) {
          speak(`Pendiente sin resolver: ${overdue[0].title}.`);
          pushNotif("⚠️ PENDIENTE VENCIDO", overdue[0].title);
          setReminderTask(overdue[0]);
        }
      }
    };

    tick();
    const interval = setInterval(tick, 60 * 1000);
    return () => clearInterval(interval);
  }, [tasks, events, routine, routineLog, snoozed, followUpQueue, followUpTarget, reminderTask, speak, pushNotif]);

  useEffect(() => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; }, [messages, loading]);

  // ── AI ──────────────────────────────────────────────────────────────────
  const buildContext = useCallback(() => {
    const overdue   = tasks.filter(t => t.status !== "done" && t.dueDate < todayStr());
    const todayT    = tasks.filter(t => t.status !== "done" && t.dueDate === todayStr());
    const upcoming  = tasks.filter(t => t.status !== "done" && t.dueDate > todayStr()).slice(0, 5);
    const urgPays   = payments.filter(p => { const d = daysUntil(p.nextDue); return d >= 0 && d <= 7; });
    const todayEvs  = events.filter(e => e.date === todayStr() && e.status !== "done").sort((a,b) => (a.time||"").localeCompare(b.time||""));
    const upcomingE = events.filter(e => e.date > todayStr() && e.status !== "done").slice(0, 5);
    const mIncome   = finance.filter(f => f.type === "income"  && f.date?.startsWith(todayStr().slice(0,7))).reduce((s,f) => s+f.amount, 0);
    const mExp      = finance.filter(f => f.type === "expense" && f.date?.startsWith(todayStr().slice(0,7))).reduce((s,f) => s+f.amount, 0);
    const cos       = [...new Set([...projects.map(p=>p.company), ...payments.map(p=>p.company), ...tasks.map(t=>t.company)].filter(Boolean))];
    return `=== NEXUS CONTEXTO ===
FECHA: ${new Date().toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
EMPRESAS: ${cos.join(", ")||"ninguna"}
VENCIDAS [${overdue.length}]: ${overdue.map(t=>`[${t.id}]"${t.title}"(${Math.abs(daysUntil(t.dueDate))}d)`).join(" | ")||"ninguna"}
TAREAS HOY: ${todayT.map(t=>`"${t.title}"(${t.priority})`).join(", ")||"ninguna"}
PRÓXIMAS: ${upcoming.map(t=>`"${t.title}"(${fmtDate(t.dueDate)})`).join(", ")||"ninguna"}
AGENDA HOY: ${todayEvs.map(e=>`[${e.id}]${EVENT_TYPES[e.type]?.emoji}"${e.title}"${e.time?`@${e.time}`:""}`).join(" | ")||"nada"}
AGENDA PRÓXIMA: ${upcomingE.map(e=>`"${e.title}"(${fmtDate(e.date)},${EVENT_TYPES[e.type]?.emoji})`).join(", ")||"nada"}
PAGOS 7d: ${urgPays.map(p=>`"${p.name}"$${p.amount}(${fmtDate(p.nextDue)})`).join(", ")||"ninguno"}
FINANZAS MES: +$${mIncome.toLocaleString()} -$${mExp.toLocaleString()} Neto$${(mIncome-mExp).toLocaleString()}
PROYECTOS: ${projects.map(p=>p.name+"("+p.company+")").join(", ")||"ninguno"}
======================`;
  }, [tasks, payments, projects, contacts, finance, events]);

  const buildSystem = useCallback(() => {
    const M = MODES[mode];
    return `Tu nombre es NEXUS. Asistente ejecutivo personal de ultra-performance para alguien que maneja 6+ empresas.

PERSONALIDAD HOY: ${M.name} ${M.emoji}
${M.prompt}

REGLAS:
1. SIEMPRE en español. Máximo 3-4 oraciones normalmente.
2. Para agregar items incluye al final exactamente:
---ACTIONS---
{"actions":[
  {"type":"addTask","title":"","dueDate":"YYYY-MM-DD","project":"","company":"","priority":"high|medium|low","notes":""},
  {"type":"addEvent","title":"","date":"YYYY-MM-DD","time":"HH:MM","evtype":"meeting|call|task|personal|payment","company":"","contact":"","notes":""},
  {"type":"addPayment","name":"","amount":0,"nextDue":"YYYY-MM-DD","company":""},
  {"type":"addProject","name":"","company":""},
  {"type":"addContact","name":"","phone":"","company":"","notes":""},
  {"type":"addFinance","ftype":"income|expense","amount":0,"description":"","company":"","date":"YYYY-MM-DD"},
  {"type":"completeTask","id":"ID_EXACTO"},
  {"type":"completeEvent","id":"ID_EXACTO"},
  {"type":"addHabit","title":"","icon":"⭐"}
]}
---END---
3. Solo incluye JSON si hay acciones concretas. Detecta empresa del contexto.
5. Tienes capacidad de búsqueda web. Úsala cuando el usuario pregunte sobre noticias, precios, investigación, competidores o cualquier información externa. Responde con lo que encuentres.
4. Para eventos de agenda usa addEvent con evtype: meeting=reunión, call=llamada, task=pendiente.

  // ── REMINDER PICKER COMPONENT ───────────────────────────────────────────
  const ReminderPicker = ({ value, onChange, label = "Recordatorios" }) => {
    const selected = value || [0];
    const toggle = (v) => {
      if (selected.includes(v)) onChange(selected.filter(x => x !== v));
      else onChange([...selected, v].sort((a,b)=>b-a));
    };
    return (
      <div style={$.fg}>
        <label style={$.lbl}>{label}</label>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
          {REMINDER_OPTIONS.map(opt => (
            <button key={opt.value}
              style={{ ...$.btn(selected.includes(opt.value) ? M.color : C.muted, true), padding: "5px 9px" }}
              onClick={() => toggle(opt.value)}>
              {selected.includes(opt.value) ? "✓ " : ""}{opt.label}
            </button>
          ))}
        </div>
        <div style={{ fontSize: 10, color: C.muted, marginTop: 5 }}>
          ✓ = activo · Puedes seleccionar varios · NEXUS te preguntará 15 min después si lo cumpliste
        </div>
      </div>
    );
  };

  // ════════════════════════════════════════════════════════════════════════
  // OTHER SECTIONS
  // ════════════════════════════════════════════════════════════════════════

  const ModeSelector = () => (
    <div style={{ ...$.overlay, zIndex: 400 }}>
      <div style={{ ...$.modal, borderRadius: 0, maxHeight: "100vh" }}>
        <div style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 28, textAlign: "center", marginBottom: 6, letterSpacing: 4, background: "linear-gradient(135deg, #a78bfa, #f97316)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>¿CÓMO OPERAS HOY?</div>
        <p style={{ fontSize: 13, color: "#475569", textAlign: "center", marginBottom: 20, fontFamily: "'Outfit', sans-serif" }}>Elige la personalidad de NEXUS para este día</p>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          {Object.entries(MODES).map(([k, m]) => (
            <button key={k} style={{ ...$.btn(m.color), padding: "16px 10px", display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}
              onClick={async () => { setMode(k); persist("nx3_mode", k); persist("nx3_modeday", todayStr()); setShowModeSelect(false); setTimeout(() => speak(`Modo ${m.name} activado.`), 400); }}>
              <span style={{ fontSize: 26 }}>{m.emoji}</span>
              <span style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 16, letterSpacing: 2 }}>{m.name}</span>
            </button>
          ))}
        </div>
        <div style={{ height: 12 }} />
      </div>
    </div>
  );

  const ReminderOverlay = () => {
    // Follow-up check (15 min after)
    if (followUpTarget) {
      const t = followUpTarget;
      const ET = EVENT_TYPES[t.type] || EVENT_TYPES.meeting;
      return (
        <div style={{ ...$.overlay, zIndex: 500, background: "rgba(0,0,0,0.85)" }}>
          <div style={{ ...$.modal, borderTop: `3px solid ${C.yellow}`, padding: 24 }}>
            <div style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 22, color: C.yellow, textAlign: "center", marginBottom: 4, letterSpacing: 3 }}>
              ❓ ¿LO CUMPLISTE?
            </div>
            <div style={{ fontSize: 11, color: C.muted, textAlign: "center", marginBottom: 16 }}>Han pasado 15 minutos</div>
            <div style={{ ...$.card, borderColor: C.yellow+"50", background: C.yellow+"08", marginBottom: 16 }}>
              <div style={{ fontSize: 14, fontWeight: 700 }}>{t.isRoutineFollowUp ? "⭐" : ET.emoji} {t.title}</div>
              {t.time && <div style={{ fontSize: 11, color: C.muted, marginTop: 4 }}>Programado a las {t.time}</div>}
            </div>
            <div style={{ display: "flex", gap: 10, marginBottom: 8 }}>
              <button style={{ ...$.btn(C.red), flex: 1 }} onClick={() => {
                speak("Entendido. Te lo recordaré más tarde.");
                setSnoozed(p => ({...p, [t.id]: Date.now()+30*60*1000}));
                setFollowUpTarget(null);
              }}>❌ NO AÚN</button>
              <button style={{ ...$.btnS(C.green), flex: 2 }} onClick={() => {
                if (t.isRoutineFollowUp) saveRLog(p => ({...p, [todayStr()]: {...(routineLog[todayStr()]||{}), [t.id]: true}}));
                else saveEvents(prev => prev.map(e => e.id===t.id ? {...e, status:"done"} : e));
                speak("¡Excelente! Registrado. Sigue así.");
                setFollowUpTarget(null);
              }}>✅ SÍ, LISTO</button>
            </div>
            <button style={{ ...$.btn(C.muted, true), width: "100%", textAlign: "center", display: "block" }}
              onClick={() => { setSnoozed(p => ({...p, [t.id]: Date.now()+2*3600*1000})); setFollowUpTarget(null); }}>
              Recordarme en 2 horas
            </button>
          </div>
        </div>
      );
    }

    if (!reminderTask) return null;
    const t = reminderTask;
    const isExact = t.isExactTime;
    const isRoutineAlert = t.isRoutine;
    const ET = (!isRoutineAlert && t.type) ? (EVENT_TYPES[t.type] || EVENT_TYPES.meeting) : null;
    const accentColor = isExact ? M.color : C.red;
    return (
      <div style={{ ...$.overlay, zIndex: 500, background: `${accentColor}12` }}>
        <div style={{ ...$.modal, borderTop: `3px solid ${accentColor}`, padding: 24 }}>
          <div style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 22, color: accentColor, textAlign: "center", marginBottom: 4, letterSpacing: 3 }}>
            {isRoutineAlert ? (t.isAdvance ? "⭐ RECORDATORIO RUTINA" : "⭐ HORA DE TU RUTINA") : t.isAdvance ? `${ET?.emoji || "📅"} RECORDATORIO PREVIO` : isExact ? `${ET?.emoji || "📅"} ES HORA AHORA` : "⚠️ PENDIENTE SIN RESOLVER"}
          </div>
          <div style={{ ...$.card, borderColor: accentColor+"50", background: accentColor+"08", marginBottom: 16 }}>
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 4 }}>{t.title}</div>
            {t.time && <div style={{ fontSize: 13, color: accentColor }}>🕐 {t.time}</div>}
            {t.company && <div style={{ fontSize: 11, color: C.muted }}>{t.company}</div>}
            {!isExact && !isRoutineAlert && t.dueDate && <div style={{ fontSize: 11, color: C.red, marginTop: 4 }}>Vencida hace {Math.abs(daysUntil(t.dueDate))}d</div>}
            {t.isAdvance && <div style={{ fontSize: 12, color: accentColor, marginTop: 4, fontWeight: 700 }}>📣 EN {t.minBefore < 60 ? t.minBefore + " MINUTOS" : (t.minBefore/60 === 1 ? "1 HORA" : t.minBefore/60 + " HORAS")}</div>}
            {isExact && <div style={{ fontSize: 11, color: C.muted, marginTop: 4 }}>Te preguntaré en 15 min si lo cumpliste</div>}
          </div>
          <div style={{ display: "flex", gap: 10, marginBottom: 8 }}>
            <button style={{ ...$.btn(C.muted), flex: 1 }} onClick={() => { setSnoozed(p => ({...p, [t.id]: Date.now()+30*60*1000})); setReminderTask(null); }}>⏰ 30 min</button>
            <button style={{ ...$.btnS(C.green), flex: 2 }} onClick={() => {
              if (isRoutineAlert) saveRLog(p => ({...p, [todayStr()]: {...(routineLog[todayStr()]||{}), [t.id]: true}}));
              else if (t.type) saveEvents(prev => prev.map(e => e.id===t.id ? {...e, status:"done"} : e));
              else saveTasks(prev => prev.map(x => x.id===t.id ? {...x, status:"done", completedAt:todayStr()} : x));
              setReminderTask(null); speak("¡Perfecto! Marcado como completado.");
            }}>✅ {isRoutineAlert ? "YA LO HICE" : isExact ? "ENTENDIDO" : "YA LO HICE"}</button>
          </div>
          <button style={{ ...$.btn(C.muted, true), width: "100%", textAlign: "center", display: "block" }} onClick={() => { setSnoozed(p => ({...p, [t.id]: Date.now()+2*3600*1000})); setReminderTask(null); }}>Ignorar 2 horas</button>
        </div>
      </div>
    );

  const Dashboard = () => {

          </div>
          <div style={{ height: 3, background: C.border, borderRadius: 2, marginBottom: 10, overflow: "hidden" }}>

            {routine.map(r => { const done = !!todayRLog[r.id]; return <button key={r.id} style={{ padding: "5px 10px", background: done?C.green+"20":C.border, border: `1px solid ${done?C.green:C.border}`, borderRadius: 20, color: done?C.green:C.muted, fontSize: 11, cursor: "pointer" }} onClick={() => saveRLog(p => ({...p, [todayStr()]: {...todayRLog, [r.id]: !done}}))}>{r.icon} {r.title}</button>; })}
          </div>
        </div>
      )}

      {/* Today's agenda timeline */}
      {todayEvents.length > 0 && (
        <div style={$.card}>
          <div style={{ fontSize: 10, color: C.muted, letterSpacing: 2, marginBottom: 10, fontWeight: 700, display: "flex", justifyContent: "space-between" }}>
            <span>AGENDA HOY</span>
            <span style={{ color: M.color }}>{todayEvents.filter(e=>e.status==="done").length}/{todayEvents.length}</span>

          {[

            { k: "meeting",  label: "🤝 Reuniones",  count: events.filter(e=>e.type==="meeting"&&e.status!=="done").length },
            { k: "call",     label: "📞 Llamadas",   count: events.filter(e=>e.type==="call"&&e.status!=="done").length },
            { k: "task",     label: "✅ Pendientes", count: pendingTasks.length },
            { k: "personal", label: "🌟 Personal",   count: events.filter(e=>e.type==="personal"&&e.status!=="done").length },
            { k: "projects", label: "🗂 Proyectos",  count: projects.length },
          ].map(f => (
            <button key={f.k}
              style={{
                ...$.btn(unifiedFilter === f.k ? M.color : "#334155", true),

                fontFamily: "'Outfit', sans-serif",

              onClick={() => setUnifiedFilter(f.k)}>
              {f.label}
              {f.count > 0 && (
                <span style={{ marginLeft: 6, background: unifiedFilter===f.k ? M.color : "#334155", color: unifiedFilter===f.k ? "#000" : "#94a3b8", borderRadius: 20, padding: "1px 6px", fontSize: 9, fontWeight: 700 }}>

              const pendPt = pt.filter(t => t.status !== "done");
              const overduePt = pendPt.filter(t => t.dueDate < todayStr());
              const pct = pt.length ? Math.round(donePt / pt.length * 100) : 0;
              return (
                <div key={proj.id} style={{ ...$.card, borderLeft: `3px solid ${proj.color}`, marginBottom: 10 }}>

                            <span style={$.bdg("#fb923c")}>✅ Tarea</span>

            <div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: `1px solid ${C.border}` }}>
              <div><div style={{ fontSize: 13 }}>{p.name}</div><div style={{ fontSize: 10, color: C.muted }}>{p.company}</div></div>

                <div style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 18, color: d<=1?C.red:C.yellow }}>${p.amount.toLocaleString()}</div>
                <div style={{ fontSize: 10, color: d<=1?C.red:C.muted }}>{d===0?"⚡ HOY":d===1?"mañana":`en ${d}d`}</div>

            </div>

        </div>

      {/* Finance summary - hidden by default */}
      <div style={$.card}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: showFinance ? 14 : 0 }}>
          <div style={{ fontSize: 10, color: "#475569", letterSpacing: 2, fontWeight: 700, fontFamily: "'Outfit', sans-serif" }}>💰 FINANZAS DEL MES</div>
          <button style={{ ...$.btn(M.color, true), padding: "4px 10px", fontSize: 10 }}
            onClick={() => setShowFinance(p => !p)}>
            {showFinance ? "🙈 OCULTAR" : "👁 VER"}
          </button>
        </div>
        {showFinance && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", textAlign: "center", paddingTop: 4 }}>
            <div><div style={{ ...$.statN, fontSize: 22, color: "#34d399" }}>${mIncome.toLocaleString()}</div><div style={$.statL}>INGRESOS</div></div>
            <div style={{ borderLeft: `1px solid ${C.border}`, borderRight: `1px solid ${C.border}` }}><div style={{ ...$.statN, fontSize: 22, color: "#f43f5e" }}>${mExp.toLocaleString()}</div><div style={$.statL}>GASTOS</div></div>
            <div><div style={{ ...$.statN, fontSize: 22, color: mIncome-mExp>=0?"#a78bfa":"#f43f5e" }}>${(mIncome-mExp).toLocaleString()}</div><div style={$.statL}>NETO</div></div>
          </div>
        )}
      </div>

      {tasks.length === 0 && events.length === 0 && (
        <div style={{ ...$.card, textAlign: "center", padding: "30px 16px" }}>
          <div style={{ fontSize: 28, marginBottom: 10 }}>🚀</div>
          <div style={{ color: C.muted, fontSize: 12, lineHeight: 1.9 }}>Sistema listo. Ve al chat y vacía tu mente.<br />El caos termina hoy.</div>
          <button style={{ ...$.btn(M.color), marginTop: 14 }} onClick={() => setTab("chat")}>ABRIR CHAT →</button>
        </div>
      )}
    </div>
  );
  };

  const Chat = () => (
    <div style={$.chatWrap}>
      <div style={{ padding: "8px 12px", borderBottom: `1px solid ${C.border}`, overflowX: "auto", display: "flex", gap: 6, flexShrink: 0, background: "rgba(4,4,10,0.95)", backdropFilter: "blur(20px)" }}>
        {QUICK.map((q,i) => <button key={i} style={{ ...$.btn(M.color, true), flexShrink: 0 }} onClick={() => sendMsg(q.t)}>{q.l}</button>)}
      </div>
      <div ref={chatRef} style={$.chatScroll}>
        {messages.map(m => (
          <div key={m.id} style={{ display: "flex", justifyContent: m.role==="user"?"flex-end":"flex-start", marginBottom: 10 }}>
            <div style={$.bubble(m.role)}>
              {m.role === "assistant" && (
                <div style={{ fontSize: 9, color: MODES[m.mode||"ejecutivo"].color, marginBottom: 5, letterSpacing: 1.5 }}>
                  NEXUS {MODES[m.mode||"ejecutivo"].emoji}
                  {m.addedItems > 0 && <span style={{ ...$.bdg(C.green), marginLeft: 8 }}>+{m.addedItems}</span>}
                </div>
              )}
              {m.text}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{ display: "flex", justifyContent: "flex-start", marginBottom: 10 }}>
            <div style={$.bubble("assistant")}>
              <div style={{ fontSize: 9, color: M.color, marginBottom: 5 }}>NEXUS {M.emoji}</div>
              <span style={{ color: M.color }}>▋</span>
            </div>
          </div>
        )}
      </div>
      <div style={$.chatBar}>
        <button style={{ padding: "9px 12px", background: listening?C.red+"20":"#0a0a1a", border: `1px solid ${listening?C.red:C.border}`, borderRadius: 8, cursor: "pointer", flexShrink: 0, position: "relative" }} onClick={startVoice}>
          {listening ? "🔴" : "🎙️"}
          {listening && <span style={{ position: "absolute", inset: -3, borderRadius: 8, border: `2px solid ${C.red}`, animation: "ring 1s infinite", pointerEvents: "none" }} />}
        </button>
        <input ref={inputRef} style={{ ...$.inp, flex: 1 }} value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key==="Enter"&&!e.shiftKey) { e.preventDefault(); sendMsg(); } }} placeholder={listening ? "Escuchando... 🎙️" : "Habla o escribe a NEXUS..."} />
        <button style={{ ...$.btnS(M.color), padding: "9px 14px" }} onClick={() => sendMsg()} disabled={loading}>{loading ? "···" : "→"}</button>
        <button style={{ padding: "9px 10px", background: ttsEnabled?M.color+"20":"#0a0a1a", border: `1px solid ${ttsEnabled?M.color:C.border}`, borderRadius: 8, cursor: "pointer", fontSize: 14 }} onClick={() => { const n = !ttsEnabled; setTtsEnabled(n); persist("nx3_tts", n); }}>{ttsEnabled ? "🔊" : "🔇"}</button>
      </div>
      <style>{`@keyframes ring{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.5)}}`}</style>
    </div>
  );

  const Tasks = () => {
    const filtered = tasks.filter(t => taskFilter==="done"?t.status==="done":taskFilter==="all"?true:t.status!=="done");
    const sorted   = [...filtered].sort((a,b) => { if(a.status!=="done"&&a.dueDate<todayStr()) return -1; if(b.status!=="done"&&b.dueDate<todayStr()) return 1; return new Date(a.dueDate)-new Date(b.dueDate); });
    return (
      <div>
        <div style={$.sHd}><span>TAREAS</span><button style={$.btn(M.color)} onClick={() => setModal("task")}>+ NUEVA</button></div>
        <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
          {[["pending",`PENDIENTES (${pendingTasks.length})`],["done",`HECHAS (${doneTasks.length})`],["all","TODAS"]].map(([k,l]) => (
            <button key={k} style={$.btn(taskFilter===k?M.color:C.muted,true)} onClick={() => setTaskFilter(k)}>{l}</button>
          ))}
        </div>
        <div style={$.card}>
          {sorted.length === 0 ? <div style={{ color: C.muted, textAlign: "center", padding: "20px 0", fontSize: 12 }}>{taskFilter==="pending" ? "🎉 Sin pendientes" : "Nada aquí"}</div>
            : sorted.map(t => {
              const od = t.status!=="done" && t.dueDate < todayStr();
              return (
                <div key={t.id} style={{ ...$.row, opacity: t.status==="done"?0.5:1, borderColor: od?C.red+"30":C.border }}>
                  <div style={$.chk(t.status==="done")} onClick={() => saveTasks(prev => prev.map(x => x.id===t.id ? {...x, status: x.status==="done"?"pending":"done", completedAt: x.status!=="done"?todayStr():undefined} : x))}>
                    {t.status==="done" && <span style={{ color: C.green, fontSize: 11, fontWeight: 700 }}>✓</span>}
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, textDecoration: t.status==="done"?"line-through":"none" }}>{t.title}</div>
                    {t.notes && <div style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>{t.notes}</div>}
                    <div style={{ display: "flex", gap: 5, marginTop: 5, flexWrap: "wrap", alignItems: "center" }}>
                      {(t.company||t.project) && <span style={$.bdg(M.color)}>{t.company||t.project}</span>}
                      <span style={$.bdg(priColor(t.priority))}>{t.priority}</span>
                      <span style={{ fontSize: 10, color: od?C.red:C.muted }}>{od?`⚠️ vencida ${fmtDate(t.dueDate)}`:fmtDate(t.dueDate)}</span>
                    </div>
                  </div>
                  <button style={$.del} onClick={() => saveTasks(prev => prev.filter(x => x.id!==t.id))}>×</button>
                </div>
              );
            })}
        </div>
      </div>
    );
  };

  const MoreDrawer = () => (
    <div style={{ ...$.overlay, zIndex: 200 }} onClick={() => setShowMore(false)}>
      <div style={{ ...$.modal, maxHeight: "88vh" }} onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", gap: 6, marginBottom: 16, overflowX: "auto" }}>
          {[["projects","🗂 Proyectos"],["finance","💰 Dinero"],["routine","⚡ Rutina"],["contacts","👥 Contactos"]].map(([k,l]) => (
            <button key={k} style={{ ...$.btn(moreSection===k?M.color:C.muted,true), flex: 1, flexShrink: 0 }} onClick={() => setMoreSection(k)}>{l}</button>
          ))}
        </div>

        {moreSection === "projects" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
              <span style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 18, letterSpacing: 3, color: M.color }}>PROYECTOS</span>
              <button style={$.btn(M.color, true)} onClick={() => { setShowMore(false); setModal("project"); }}>+ NUEVO</button>
            </div>
            {projects.length === 0 ? <div style={{ color: C.muted, textAlign: "center", padding: "20px 0", fontSize: 11 }}>Sin proyectos aún.</div> :
              projects.map(proj => {
                const pt = tasks.filter(t => t.project===proj.name || t.company===proj.company);
                const doneP = pt.filter(t => t.status==="done").length;
                const pct = pt.length ? Math.round(doneP/pt.length*100) : 0;
                return (
                  <div key={proj.id} style={{ ...$.card, borderLeft: `3px solid ${proj.color}`, marginBottom: 10 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                      <div><div style={{ fontWeight: 700, fontSize: 13 }}>{proj.name}</div><div style={{ fontSize: 11, color: C.muted }}>{proj.company}</div></div>
                      <div style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 24, color: proj.color }}>{doneP}/{pt.length}</div>
                    </div>
                    <div style={{ height: 3, background: C.border, borderRadius: 2, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${pct}%`, background: proj.color, borderRadius: 2 }} />
                    </div>
                    <button style={{ ...$.del, display: "block", marginLeft: "auto", marginTop: 8, fontSize: 11 }} onClick={() => saveProjs(prev => prev.filter(x => x.id!==proj.id))}>× eliminar</button>
                  </div>
                );
              })}
          </div>
        )}

        {moreSection === "finance" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
              <span style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 18, letterSpacing: 3, color: M.color }}>DINERO</span>
              <div style={{ display: "flex", gap: 6 }}>
                <button style={$.btn(C.green,true)} onClick={() => { setShowMore(false); setModal("finance"); }}>+ MOVIMIENTO</button>
                <button style={$.btn(M.color,true)} onClick={() => { setShowMore(false); setModal("payment"); }}>+ PAGO</button>
              </div>
            </div>
            <div style={$.card}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: showFinance ? 14 : 0 }}>
                <div style={{ fontSize: 10, color: "#475569", letterSpacing: 2, fontWeight: 700 }}>TOTALES DEL MES</div>
                <button style={{ ...$.btn(M.color, true), padding: "4px 10px" }} onClick={() => setShowFinance(p => !p)}>
                  {showFinance ? "🙈 OCULTAR" : "👁 VER TOTALES"}
                </button>
              </div>
              {showFinance && (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", textAlign: "center", paddingTop: 4 }}>
                  <div><div style={{ ...$.statN, fontSize: 22, color: "#34d399" }}>${mIncome.toLocaleString()}</div><div style={$.statL}>INGRESOS</div></div>
                  <div style={{ borderLeft: `1px solid ${C.border}`, borderRight: `1px solid ${C.border}` }}><div style={{ ...$.statN, fontSize: 22, color: "#f43f5e" }}>${mExp.toLocaleString()}</div><div style={$.statL}>GASTOS</div></div>
                  <div><div style={{ ...$.statN, fontSize: 22, color: mIncome-mExp>=0?"#a78bfa":"#f43f5e" }}>${(mIncome-mExp).toLocaleString()}</div><div style={$.statL}>NETO</div></div>
                </div>
              )}
            </div>
            <div style={$.card}>
              <div style={{ fontSize: 10, color: C.muted, letterSpacing: 2, marginBottom: 8, fontWeight: 700 }}>PAGOS RECURRENTES</div>
              {payments.length === 0 ? <div style={{ color: C.muted, fontSize: 11, textAlign: "center", padding: "12px 0" }}>Sin pagos</div> :
                [...payments].sort((a,b) => new Date(a.nextDue)-new Date(b.nextDue)).map(pay => {
                  const d = daysUntil(pay.nextDue);
                  const col = d<0?C.red:d<=3?C.yellow:C.green;
                  return (
                    <div key={pay.id} style={$.row}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 13 }}>{pay.name}</div>
                        <div style={{ display: "flex", gap: 5, marginTop: 4 }}>
                          <span style={$.bdg(C.purple)}>{pay.company}</span>
                          <span style={{ fontSize: 10, color: col }}>{d<0?`venc. ${Math.abs(d)}d`:d===0?"⚡ HOY":d===1?"mañana":`en ${d}d`}</span>
                        </div>
                      </div>
                      <div style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 20, color: col }}>${pay.amount.toLocaleString()}</div>
                      <button style={$.del} onClick={() => savePays(prev => prev.filter(x => x.id!==pay.id))}>×</button>
                    </div>
                  );
                })}
            </div>
            {finance.length > 0 && (
              <div style={$.card}>
                <div style={{ fontSize: 10, color: C.muted, letterSpacing: 2, marginBottom: 8, fontWeight: 700 }}>ÚLTIMOS MOVIMIENTOS</div>
                {[...finance].sort((a,b) => new Date(b.date)-new Date(a.date)).slice(0,8).map(f => (
                  <div key={f.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderBottom: `1px solid ${C.border}` }}>
                    <div><div style={{ fontSize: 12 }}>{f.description||"—"}</div><div style={{ fontSize: 10, color: C.muted }}>{f.company} · {fmtDate(f.date)}</div></div>
                    <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                      <span style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 16, color: f.type==="income"?C.green:C.red }}>{f.type==="income"?"+":"-"}${f.amount.toLocaleString()}</span>
                      <button style={$.del} onClick={() => saveFinance(prev => prev.filter(x => x.id!==f.id))}>×</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {moreSection === "routine" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
              <span style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 18, letterSpacing: 3, color: M.color }}>RUTINA DIARIA</span>
              <button style={$.btn(M.color,true)} onClick={() => { setShowMore(false); setModal("habit"); }}>+ HÁBITO</button>
            </div>
            <div style={$.card}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <div style={{ fontSize: 10, color: C.muted }}>HOY: {routineDone}/{routine.length}</div>
              </div>
              <div style={{ height: 4, background: C.border, borderRadius: 2, marginBottom: 12, overflow: "hidden" }}>
                <div style={{ height: "100%", width: `${routine.length?routineDone/routine.length*100:0}%`, background: M.color, borderRadius: 2 }} />
              </div>
              {routine.map(r => { const done = !!todayRLog[r.id]; return (
                <div key={r.id} style={{ ...$.row, justifyContent: "space-between" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={$.chk(done)} onClick={() => saveRLog(p => ({...p, [todayStr()]: {...todayRLog, [r.id]: !done}}))}>{done && <span style={{ color: C.green, fontWeight: 700, fontSize: 11 }}>✓</span>}</div>
                    <span style={{ fontSize: 13, textDecoration: done?"line-through":"none", color: done?C.muted:C.text }}>{r.icon} {r.title}</span>
                  </div>
                  <button style={$.del} onClick={() => saveRoutine(prev => prev.filter(x => x.id!==r.id))}>×</button>
                </div>
              );})}
              {routine.length === 0 && <div style={{ color: C.muted, fontSize: 11, textAlign: "center", padding: "12px 0" }}>Sin hábitos registrados.</div>}
            </div>
          </div>
        )}

        {moreSection === "contacts" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
              <span style={{ fontFamily: "'Bebas Neue', cursive", fontSize: 18, letterSpacing: 3, color: M.color }}>CONTACTOS</span>
              <button style={$.btn(M.color,true)} onClick={() => { setShowMore(false); setModal("contact"); }}>+ NUEVO</button>
            </div>
            {contacts.length === 0 ? <div style={{ color: C.muted, textAlign: "center", padding: "20px 0", fontSize: 11 }}>Sin contactos.</div> :
              contacts.map(c => (
                <div key={c.id} style={$.row}>
                  <div style={{ width: 36, height: 36, borderRadius: "50%", background: M.color+"25", border: `1px solid ${M.color}`, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Bebas Neue', cursive", fontSize: 16, color: M.color, flexShrink: 0 }}>{c.name[0]?.toUpperCase()}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 700 }}>{c.name}</div>
                    {c.phone && <div style={{ fontSize: 11, color: C.muted }}>{c.phone}</div>}
                    <div style={{ display: "flex", gap: 5, marginTop: 3, flexWrap: "wrap" }}>
                      {c.company && <span style={$.bdg(M.color)}>{c.company}</span>}
                      {c.notes && <span style={{ fontSize: 10, color: C.muted }}>{c.notes}</span>}
                    </div>
                  </div>
                  <button style={$.del} onClick={() => saveContacts(prev => prev.filter(x => x.id!==c.id))}>×</button>
                </div>
              ))}
          </div>
        )}
        <div style={{ height: 12 }} />
      </div>
    </div>
  );

  // ── MODAL ACTIONS ────────────────────────────────────────────────────────
  const addModalTask    = () => { if (!newTask.title.trim()) return; saveTasks(p => [...p, { id: uid(), ...newTask, status: "pending", createdAt: todayStr() }]); setNewTask({ title: "", dueDate: todayStr(), project: "", company: "", priority: "medium", notes: "" }); setModal(null); };
  const addModalPay     = () => { if (!newPay.name.trim()) return; savePays(p => [...p, { id: uid(), ...newPay, amount: parseFloat(newPay.amount)||0 }]); setNewPay({ name: "", amount: "", nextDue: todayStr(), company: "Personal" }); setModal(null); };
  const addModalProj    = () => { if (!newProj.name.trim()) return; saveProjs(p => [...p, { id: uid(), ...newProj, color: COMPANY_COLORS[p.length%COMPANY_COLORS.length], notes: "" }]); setNewProj({ name: "", company: "" }); setModal(null); };
  const addModalContact = () => { if (!newContact.name.trim()) return; saveContacts(p => [...p, { id: uid(), ...newContact }]); setNewContact({ name: "", phone: "", company: "", notes: "" }); setModal(null); };
  const addModalFinance = () => { if (!newFinance.amount) return; saveFinance(p => [...p, { id: uid(), type: newFinance.type, amount: parseFloat(newFinance.amount)||0, description: newFinance.description, company: newFinance.company, date: newFinance.date }]); setNewFinance({ type: "income", amount: "", description: "", company: "", date: todayStr() }); setModal(null); };
  const addModalHabit   = () => { if (!newHabit.title.trim()) return; saveRoutine(p => [...p, { id: uid(), ...newHabit }]); setNewHabit({ title: "", icon: "⭐" }); setModal(null); };
  const addModalEvent   = () => { if (!newEvent.title.trim()) return; saveEvents(p => [...p, { id: uid(), ...newEvent }]); setNewEvent({ title: "", date: todayStr(), time: "09:00", type: "meeting", company: "", contact: "", notes: "", status: "pending", reminders: [15] }); setModal(null); };

  const ICONS = ["⭐","💪","🧘","📧","📞","💰","🏃","📚","🎯","✍️","🌅","💤","🥗","💧","🧠","🤝"];

  // ════════════════════════════════════════════════════════════════════════
  // MAIN RENDER
  // ════════════════════════════════════════════════════════════════════════
  return (
    <div style={$.root}>
      {showModeSelect && <ModeSelector />}
      <ReminderOverlay />
      {showMore && <MoreDrawer />}

      {/* HEADER */}
      <div style={$.hdr}>
        <div style={$.logo}>NEXUS {M.emoji}</div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          {overdueTasks.length > 0 && <div style={{ background: C.red, color: C.bg, borderRadius: 20, padding: "2px 9px", fontSize: 10, fontWeight: 700 }}>{overdueTasks.length}⚠️</div>}
          <button style={$.btn(ttsEnabled?M.color:C.muted,true)} onClick={() => { const n=!ttsEnabled; setTtsEnabled(n); persist("nx3_tts",n); }}>{ttsEnabled?"🔊":"🔇"}</button>
        </div>
      </div>

      {/* CONTENT */}
      {tab === "chat" ? <Chat /> : (
        <div style={$.scroll}>
          {tab === "dashboard" && <Dashboard />}
          {tab === "agenda"    && <Agenda />}
          {tab === "tasks"     && <Tasks />}
        </div>
      )}

      {/* BOTTOM NAV */}
      <nav style={$.nav}>
        {[
          { k: "dashboard", icon: "◉", label: "HOY",    badge: overdueTasks.length>0 ? {n:overdueTasks.length,c:C.red} : null },
          { k: "chat",      icon: "◈", label: "NEXUS",  badge: null },
          { k: "agenda",    icon: "📅", label: "AGENDA", badge: pendingEvents.filter(e=>e.date<=todayStr()).length>0 ? {n:pendingEvents.filter(e=>e.date<=todayStr()).length,c:M.color} : null },
          { k: "tasks",     icon: "▣", label: "TAREAS", badge: pendingTasks.length>0 ? {n:pendingTasks.length,c:M.color} : null },
        ].map(({k,icon,label,badge}) => (
          <button key={k} style={$.navB(k)} onClick={() => { setTab(k); setShowMore(false); }}>
            {badge && <span style={$.badge2(badge.c)}>{badge.n}</span>}
            <span style={{ fontSize: k==="agenda"?15:17 }}>{icon}</span>
            <span>{label}</span>
          </button>
        ))}
        <button style={{ ...$.navB("more"), color: showMore?M.color:C.muted }} onClick={() => setShowMore(p=>!p)}>
          <span style={{ fontSize: 17 }}>⊞</span>
          <span>MÁS</span>
        </button>
      </nav>

      {/* ── MODALS ── */}

      {modal === "event" && (
        <div style={$.overlay} onClick={() => setModal(null)}>
          <div style={$.modal} onClick={e => e.stopPropagation()}>
            <div style={$.mHd}>NUEVO EVENTO</div>
            <div style={$.fg}><label style={$.lbl}>Título del evento</label><input autoFocus style={$.inp} value={newEvent.title} onChange={e => setNewEvent(p=>({...p,title:e.target.value}))} placeholder="Reunión con cliente, llamada con proveedor..." onKeyDown={e => e.key==="Enter" && addModalEvent()} /></div>
            <div style={$.fg}>
              <label style={$.lbl}>Tipo</label>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {Object.entries(EVENT_TYPES).map(([k,et]) => (
                  <button key={k} style={{ ...$.btn(newEvent.type===k?et.color:C.muted,true), padding: "6px 10px" }} onClick={() => setNewEvent(p=>({...p,type:k}))}>{et.emoji} {et.label}</button>
                ))}
              </div>
            </div>
            <div style={{ ...$.r2, ...$.fg }}>
              <div><label style={$.lbl}>Fecha</label><input style={$.inp} type="date" value={newEvent.date} onChange={e => setNewEvent(p=>({...p,date:e.target.value}))} /></div>
              <div><label style={$.lbl}>Hora</label><input style={$.inp} type="time" value={newEvent.time} onChange={e => setNewEvent(p=>({...p,time:e.target.value}))} /></div>
            </div>
            <div style={{ ...$.r2, ...$.fg }}>
              <div><label style={$.lbl}>Empresa</label><input style={$.inp} value={newEvent.company} onChange={e => setNewEvent(p=>({...p,company:e.target.value}))} placeholder="Empresa..." list="ce1" /><datalist id="ce1">{allCompanies.map(c=><option key={c} value={c}/>)}</datalist></div>
              <div><label style={$.lbl}>Contacto</label><input style={$.inp} value={newEvent.contact} onChange={e => setNewEvent(p=>({...p,contact:e.target.value}))} placeholder="¿Con quién?" list="cc1" /><datalist id="cc1">{contacts.map(c=><option key={c.id} value={c.name}/>)}</datalist></div>
            </div>
            <div style={$.fg}><label style={$.lbl}>Notas</label><input style={$.inp} value={newEvent.notes} onChange={e => setNewEvent(p=>({...p,notes:e.target.value}))} placeholder="Agenda, objetivo, link de la reunión..." /></div>
            <ReminderPicker value={newEvent.reminders} onChange={v => setNewEvent(p=>({...p,reminders:v}))} label="Recordatorios previos" />
            <div style={{ display: "flex", gap: 10 }}><button style={{ ...$.btn(C.muted), flex: 1 }} onClick={() => setModal(null)}>CANCELAR</button><button style={{ ...$.btn(EVENT_TYPES[newEvent.type]?.color||M.color), flex: 2 }} onClick={addModalEvent}>AGREGAR EVENTO</button></div>
          </div>
        </div>
      )}

      {modal === "task" && (
        <div style={$.overlay} onClick={() => setModal(null)}>
          <div style={$.modal} onClick={e => e.stopPropagation()}>
            <div style={$.mHd}>NUEVA TAREA</div>
            <div style={$.fg}><label style={$.lbl}>¿Qué hay que hacer?</label><input autoFocus style={$.inp} value={newTask.title} onChange={e => setNewTask(p=>({...p,title:e.target.value}))} placeholder="Describe la tarea..." onKeyDown={e => e.key==="Enter" && addModalTask()} /></div>
            <div style={$.fg}><label style={$.lbl}>Notas</label><input style={$.inp} value={newTask.notes} onChange={e => setNewTask(p=>({...p,notes:e.target.value}))} placeholder="Contexto adicional..." /></div>
            <div style={{ ...$.r2, ...$.fg }}>
              <div><label style={$.lbl}>Fecha</label><input style={$.inp} type="date" value={newTask.dueDate} onChange={e => setNewTask(p=>({...p,dueDate:e.target.value}))} /></div>
              <div><label style={$.lbl}>Prioridad</label><select style={$.sel} value={newTask.priority} onChange={e => setNewTask(p=>({...p,priority:e.target.value}))}><option value="high">🔴 Alta</option><option value="medium">🟡 Media</option><option value="low">🟢 Baja</option></select></div>
            </div>
            <div style={{ ...$.r2, ...$.fg }}>
              <div><label style={$.lbl}>Empresa</label><input style={$.inp} value={newTask.company} onChange={e => setNewTask(p=>({...p,company:e.target.value}))} placeholder="Empresa..." list="ct1" /><datalist id="ct1">{allCompanies.map(c=><option key={c} value={c}/>)}</datalist></div>
              <div><label style={$.lbl}>Proyecto</label><input style={$.inp} value={newTask.project} onChange={e => setNewTask(p=>({...p,project:e.target.value}))} placeholder="Proyecto..." list="cp1" /><datalist id="cp1">{projects.map(p=><option key={p.id} value={p.name}/>)}</datalist></div>
            </div>
            <div style={{ display: "flex", gap: 10 }}><button style={{ ...$.btn(C.muted), flex: 1 }} onClick={() => setModal(null)}>CANCELAR</button><button style={{ ...$.btn(M.color), flex: 2 }} onClick={addModalTask}>AGREGAR TAREA</button></div>
          </div>
        </div>
      )}

      {modal === "payment" && (
        <div style={$.overlay} onClick={() => setModal(null)}>
          <div style={$.modal} onClick={e => e.stopPropagation()}>
            <div style={$.mHd}>NUEVO PAGO RECURRENTE</div>
            <div style={$.fg}><label style={$.lbl}>Nombre del pago</label><input autoFocus style={$.inp} value={newPay.name} onChange={e => setNewPay(p=>({...p,name:e.target.value}))} placeholder="Renta, Netflix, Servidor..." /></div>
            <div style={{ ...$.r2, ...$.fg }}>
              <div><label style={$.lbl}>Monto</label><input style={$.inp} type="number" value={newPay.amount} onChange={e => setNewPay(p=>({...p,amount:e.target.value}))} placeholder="0" /></div>
              <div><label style={$.lbl}>Próximo vencimiento</label><input style={$.inp} type="date" value={newPay.nextDue} onChange={e => setNewPay(p=>({...p,nextDue:e.target.value}))} /></div>
            </div>
            <div style={$.fg}><label style={$.lbl}>Empresa</label><input style={$.inp} value={newPay.company} onChange={e => setNewPay(p=>({...p,company:e.target.value}))} placeholder="Personal o empresa..." list="cpay1" /><datalist id="cpay1">{["Personal",...allCompanies].map(c=><option key={c} value={c}/>)}</datalist></div>
            <div style={{ display: "flex", gap: 10 }}><button style={{ ...$.btn(C.muted), flex: 1 }} onClick={() => setModal(null)}>CANCELAR</button><button style={{ ...$.btn(M.color), flex: 2 }} onClick={addModalPay}>AGREGAR PAGO</button></div>
          </div>
        </div>
      )}

      {modal === "project" && (
        <div style={$.overlay} onClick={() => setModal(null)}>
          <div style={$.modal} onClick={e => e.stopPropagation()}>
            <div style={$.mHd}>NUEVO PROYECTO</div>
            <div style={$.fg}><label style={$.lbl}>Nombre</label><input autoFocus style={$.inp} value={newProj.name} onChange={e => setNewProj(p=>({...p,name:e.target.value}))} placeholder="Nombre del proyecto..." /></div>
            <div style={$.fg}><label style={$.lbl}>Empresa</label><input style={$.inp} value={newProj.company} onChange={e => setNewProj(p=>({...p,company:e.target.value}))} placeholder="¿A qué empresa pertenece?" list="cproj1" /><datalist id="cproj1">{allCompanies.map(c=><option key={c} value={c}/>)}</datalist></div>
            <div style={{ display: "flex", gap: 10 }}><button style={{ ...$.btn(C.muted), flex: 1 }} onClick={() => setModal(null)}>CANCELAR</button><button style={{ ...$.btn(M.color), flex: 2 }} onClick={addModalProj}>CREAR PROYECTO</button></div>
          </div>
        </div>
      )}

      {modal === "contact" && (
        <div style={$.overlay} onClick={() => setModal(null)}>
          <div style={$.modal} onClick={e => e.stopPropagation()}>
            <div style={$.mHd}>NUEVO CONTACTO</div>
            <div style={$.fg}><label style={$.lbl}>Nombre</label><input autoFocus style={$.inp} value={newContact.name} onChange={e => setNewContact(p=>({...p,name:e.target.value}))} placeholder="Nombre completo..." /></div>
            <div style={{ ...$.r2, ...$.fg }}>
              <div><label style={$.lbl}>Teléfono</label><input style={$.inp} type="tel" value={newContact.phone} onChange={e => setNewContact(p=>({...p,phone:e.target.value}))} placeholder="+1..." /></div>
              <div><label style={$.lbl}>Empresa</label><input style={$.inp} value={newContact.company} onChange={e => setNewContact(p=>({...p,company:e.target.value}))} placeholder="Empresa..." list="ccon1" /><datalist id="ccon1">{allCompanies.map(c=><option key={c} value={c}/>)}</datalist></div>
            </div>
            <div style={$.fg}><label style={$.lbl}>Notas</label><input style={$.inp} value={newContact.notes} onChange={e => setNewContact(p=>({...p,notes:e.target.value}))} placeholder="Contexto del contacto..." /></div>
            <div style={{ display: "flex", gap: 10 }}><button style={{ ...$.btn(C.muted), flex: 1 }} onClick={() => setModal(null)}>CANCELAR</button><button style={{ ...$.btn(M.color), flex: 2 }} onClick={addModalContact}>AGREGAR</button></div>
          </div>
        </div>
      )}

      {modal === "finance" && (
        <div style={$.overlay} onClick={() => setModal(null)}>
          <div style={$.modal} onClick={e => e.stopPropagation()}>
            <div style={$.mHd}>REGISTRAR MOVIMIENTO</div>
            <div style={$.fg}>
              <label style={$.lbl}>Tipo</label>
              <div style={{ display: "flex", gap: 8 }}>
                <button style={{ ...$.btn(newFinance.type==="income"?C.green:C.muted), flex: 1 }} onClick={() => setNewFinance(p=>({...p,type:"income"}))}>💚 INGRESO</button>
                <button style={{ ...$.btn(newFinance.type==="expense"?C.red:C.muted), flex: 1 }} onClick={() => setNewFinance(p=>({...p,type:"expense"}))}>🔴 GASTO</button>
              </div>
            </div>
            <div style={$.fg}><label style={$.lbl}>Descripción</label><input autoFocus style={$.inp} value={newFinance.description} onChange={e => setNewFinance(p=>({...p,description:e.target.value}))} placeholder="¿De qué es?" /></div>
            <div style={{ ...$.r2, ...$.fg }}>
              <div><label style={$.lbl}>Monto</label><input style={$.inp} type="number" value={newFinance.amount} onChange={e => setNewFinance(p=>({...p,amount:e.target.value}))} placeholder="0" /></div>
              <div><label style={$.lbl}>Fecha</label><input style={$.inp} type="date" value={newFinance.date} onChange={e => setNewFinance(p=>({...p,date:e.target.value}))} /></div>
            </div>
            <div style={$.fg}><label style={$.lbl}>Empresa</label><input style={$.inp} value={newFinance.company} onChange={e => setNewFinance(p=>({...p,company:e.target.value}))} placeholder="¿A qué empresa?" list="cfin1" /><datalist id="cfin1">{["Personal",...allCompanies].map(c=><option key={c} value={c}/>)}</datalist></div>
            <div style={{ display: "flex", gap: 10 }}><button style={{ ...$.btn(C.muted), flex: 1 }} onClick={() => setModal(null)}>CANCELAR</button><button style={{ ...$.btn(newFinance.type==="income"?C.green:C.red), flex: 2 }} onClick={addModalFinance}>REGISTRAR</button></div>
          </div>
        </div>
      )}

      {modal === "habit" && (
        <div style={$.overlay} onClick={() => setModal(null)}>
          <div style={$.modal} onClick={e => e.stopPropagation()}>
            <div style={$.mHd}>NUEVO HÁBITO / RUTINA</div>
            <div style={$.fg}><label style={$.lbl}>¿Qué hábito?</label><input autoFocus style={$.inp} value={newHabit.title} onChange={e => setNewHabit(p=>({...p,title:e.target.value}))} placeholder="Ejercicio, Revisar emails, Meditación..." /></div>
            <div style={$.fg}>
              <label style={$.lbl}>Hora del hábito (opcional)</label>
              <input style={$.inp} type="time" value={newHabit.time||""} onChange={e => setNewHabit(p=>({...p,time:e.target.value}))} />
            </div>
            {newHabit.time && <ReminderPicker value={newHabit.reminders} onChange={v => setNewHabit(p=>({...p,reminders:v}))} label="Avisarme antes" />}
            <div style={$.fg}>
              <label style={$.lbl}>Ícono</label>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {ICONS.map(icon => <button key={icon} style={{ fontSize: 20, background: newHabit.icon===icon?M.color+"30":"transparent", border: `1px solid ${newHabit.icon===icon?M.color:C.border}`, borderRadius: 8, padding: "6px 8px", cursor: "pointer" }} onClick={() => setNewHabit(p=>({...p,icon}))}>{icon}</button>)}
              </div>
            </div>
            <div style={{ display: "flex", gap: 10 }}><button style={{ ...$.btn(C.muted), flex: 1 }} onClick={() => setModal(null)}>CANCELAR</button><button style={{ ...$.btn(M.color), flex: 2 }} onClick={addModalHabit}>AGREGAR HÁBITO</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(NEXUS));
  </script>
</body>
</html>
